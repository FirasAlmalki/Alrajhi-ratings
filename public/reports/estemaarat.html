<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>الاستمارات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Tajawal','Segoe UI',sans-serif;direction:rtl}
body{background:#0F1923;color:#F0EAD6}

/* Header */
.phdr{background:#1B3A6B;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:2px solid #C9A84C}
.phdr-logo{font-size:.95rem;font-weight:800;color:#C9A84C;line-height:1.3}
.phdr-logo small{display:block;font-size:.6rem;color:#8AADDA;font-weight:400}
.phdr-title{font-size:1.2rem;font-weight:800;color:#fff;text-align:center;flex:1}

/* Filter bar */
.fbar{background:#1B2535;border-bottom:1px solid #2E3D50;padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fgrp{display:flex;flex-direction:column;gap:3px}
.flbl{font-size:.7rem;color:#8AADDA;font-weight:700}
.finp{background:#0F1923;border:1px solid #2E3D50;border-radius:7px;padding:7px 10px;font-family:inherit;font-size:.8rem;color:#F0EAD6;outline:none;min-width:130px}
.finp:focus{border-color:#C9A84C}
.finp option{background:#1B2535;color:#F0EAD6}
.fbtn{padding:7px 18px;border-radius:7px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:background .15s}
.fapply{background:#C9A84C;color:#0F1923}
.fapply:hover{background:#b8973e}
.fclear{background:#2E3D50;color:#8AADDA;border:1px solid #3a4f66}
.fclear:hover{background:#374d63}

/* Main */
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.loading{text-align:center;padding:60px;color:#8AADDA;font-size:1rem}

/* Export */
.export-row{display:flex;justify-content:flex-end;margin-bottom:14px}
.export-btn{background:#1B3A6B;color:#C9A84C;border:2px solid #C9A84C;border-radius:8px;padding:8px 20px;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;transition:background .15s}
.export-btn:hover{background:#0C2550}
.export-btn:disabled{opacity:.5;cursor:not-allowed}

/* KPI row */
.kpi-row{display:flex;gap:14px;margin-bottom:8px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:200px;border-radius:12px;padding:18px 22px 0 22px;cursor:pointer;transition:transform .15s,box-shadow .15s;border:1px solid transparent;text-align:center;overflow:hidden}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.4)}
.kpi-istiqbal{background:#1B3A6B;border-color:#2E5490}
.kpi-mashaer{background:#2a2200;border-color:#C9A84C55}
.kpi-mughadara{background:#0d1f1f;border-color:#2E6E7E55}
.kpi-full-name{font-size:.72rem;font-weight:700;margin-bottom:10px;line-height:1.4}
.kpi-istiqbal .kpi-full-name{color:#8AADDA}
.kpi-mashaer .kpi-full-name{color:#C9A84C}
.kpi-mughadara .kpi-full-name{color:#4db8c8}
.kpi-count{font-size:2.2rem;font-weight:800;line-height:1}
.kpi-istiqbal .kpi-count{color:#F0EAD6}
.kpi-mashaer .kpi-count{color:#C9A84C}
.kpi-mughadara .kpi-count{color:#4db8c8}
.kpi-pct{font-size:1rem;font-weight:700;margin-top:4px;margin-bottom:10px}
.kpi-istiqbal .kpi-pct{color:#C9A84C}
.kpi-mashaer .kpi-pct{color:#C9A84C}
.kpi-mughadara .kpi-pct{color:#4db8c8}
.kpi-spark{display:block;width:100%;height:52px}

/* Average bar */
.avg-bar{background:#1B2535;border:1px solid #2E3D50;border-radius:10px;padding:12px 22px 0 22px;margin-bottom:20px;overflow:hidden}
.avg-bar-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.avg-bar-lbl{font-size:.75rem;color:#8AADDA;font-weight:700}
.avg-bar-val{font-size:1rem;font-weight:800;color:#C9A84C}

/* Center grid */
.centers-grid{display:flex;flex-direction:column;gap:8px}
.ccard{background:#1B2535;border:1px solid #2E3D50;border-radius:10px;overflow:hidden}
.ccard-hdr{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;user-select:none;transition:background .15s}
.ccard-hdr:hover{background:#1f2e45}
.ccard-name{font-size:.88rem;font-weight:700;color:#F0EAD6;flex:1}
.ccard-badges{display:flex;gap:6px;align-items:center}
.cbadge{display:inline-flex;align-items:center;justify-content:center;min-width:32px;height:26px;padding:0 8px;border-radius:6px;font-size:.78rem;font-weight:700;cursor:pointer;transition:opacity .15s;border:none}
.cbadge:hover{opacity:.8}
.cbadge-ist{background:#1B3A6B;color:#F0EAD6}
.cbadge-mas{background:#3a2e00;color:#C9A84C;border:1px solid #C9A84C55}
.cbadge-mug{background:#0d2020;color:#4db8c8;border:1px solid #2E6E7E55}
.cbadge.zero{opacity:.4}
.carrow{color:#8AADDA;font-size:.75rem;transition:transform .2s;margin-right:4px}
.carrow.open{transform:rotate(180deg)}

/* Center expand */
.ccard-body{display:none;border-top:1px solid #2E3D50;padding:0}
.ccard-body.open{display:block}
.ctype-row{display:flex;align-items:center;gap:12px;padding:9px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid #1a2535}
.ctype-row:last-child{border-bottom:none}
.ctype-row:hover{background:#1a2d42}
.ctype-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.ctype-dot-ist{background:#4472C4}
.ctype-dot-mas{background:#C9A84C}
.ctype-dot-mug{background:#2E6E7E}
.ctype-name{font-size:.8rem;color:#F0EAD6;flex:1}
.ctype-stats{display:flex;gap:16px;align-items:center}
.ctype-cnt{font-size:.88rem;font-weight:700;color:#F0EAD6;min-width:28px;text-align:center}
.ctype-pct{font-size:.78rem;color:#8AADDA;min-width:46px;text-align:left}
.ctype-zero .ctype-cnt,.ctype-zero .ctype-pct{color:#3a4f66}
.ctype-zero .ctype-name{color:#3a4f66}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:600;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-ov.open{display:flex}
.modal-box{background:#1B2535;border:1px solid #2E3D50;border-radius:14px;width:100%;max-width:900px;margin-top:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:#1B3A6B;border-radius:14px 14px 0 0;border-bottom:2px solid #C9A84C}
.modal-hdr-title{color:#C9A84C;font-size:.9rem;font-weight:700;flex:1}
.modal-hdr-actions{display:flex;gap:8px;align-items:center}
.modal-export-btn{background:rgba(201,168,76,.15);border:1px solid #C9A84C55;border-radius:6px;color:#C9A84C;padding:4px 12px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700}
.modal-export-btn:hover{background:rgba(201,168,76,.25)}
.modal-close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#F0EAD6;padding:4px 12px;cursor:pointer;font-family:inherit;font-size:.82rem}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:14px 18px;max-height:70vh;overflow-y:auto}

/* Table */
.mtable{width:100%;border-collapse:collapse;font-size:.76rem}
.mtable th{background:#1B3A6B;color:#C9A84C;padding:8px 10px;text-align:center;border:1px solid #2E5490;font-weight:700;position:sticky;top:0;white-space:nowrap;cursor:pointer;user-select:none}
.mtable th:hover{background:#1e4080}
.mtable th .sort-arrow{margin-right:4px;font-size:.65rem;opacity:.6}
.mtable th.sorted .sort-arrow{opacity:1;color:#fff}
.mtable td{padding:7px 10px;text-align:center;border:1px solid #2E3D50;color:#F0EAD6;vertical-align:middle}
.mtable td.txt{text-align:right;white-space:normal;line-height:1.4}
.mtable tr:nth-child(even) td{background:#1a2d42}
.mtable tr:hover td{background:#243550}
.no-data{text-align:center;padding:30px;color:#8AADDA;font-size:.85rem}

/* Pct badge in table */
.pct-pill{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.72rem;font-weight:700}
.pct-hi{background:#1a3a2a;color:#4CAF8A;border:1px solid #2e6644}
.pct-mid{background:#3a2e00;color:#C9A84C;border:1px solid #6a5200}
.pct-lo{background:#3a1a1a;color:#e07070;border:1px solid #6a2a2a}

@media(max-width:768px){
  .phdr{padding:10px 14px;flex-wrap:wrap}
  .fbar{padding:10px 14px}
  .main{padding:12px}
  .kpi-row{gap:10px}
}
</style>
</head>
<body>

<div class="phdr">
  <div class="phdr-logo">الراجحي<small>Al Rajhi</small></div>
  <div class="phdr-title">الاستمارات</div>
</div>

<div class="fbar">
  <div class="fgrp"><div class="flbl">من تاريخ</div><input type="date" class="finp" id="fFrom"></div>
  <div class="fgrp"><div class="flbl">إلى تاريخ</div><input type="date" class="finp" id="fTo"></div>
  <div class="fgrp">
    <div class="flbl">الموقع</div>
    <select class="finp" id="fLoc">
      <option value="">— الكل —</option>
      <option value="مكة المكرمة">مكة المكرمة</option>
      <option value="المدينة المنورة">المدينة المنورة</option>
    </select>
  </div>
  <div class="fgrp">
    <div class="flbl">مركز الضيافة</div>
    <select class="finp" id="fCenter" style="min-width:180px">
      <option value="">— الكل —</option>
    </select>
  </div>
  <div style="display:flex;gap:6px;align-items:flex-end">
    <button class="fbtn fapply" onclick="applyFilter()">تطبيق</button>
    <button class="fbtn fclear" onclick="clearFilter()">مسح</button>
  </div>
</div>

<div class="main">
  <div class="loading" id="loadMsg">⏳ جاري تحميل البيانات...</div>
  <div id="dash" style="display:none">

    <div class="export-row">
      <button class="export-btn" id="exportBtn" onclick="doExport(filteredData,'الاستمارات')">تصدير Excel</button>
    </div>

    <!-- KPI cards -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- Average bar -->
    <div class="avg-bar" id="avgBar">
      <div class="avg-bar-top">
        <span class="avg-bar-lbl">متوسط النسبة — جميع الاستمارات</span>
        <span class="avg-bar-val" id="avgVal">—</span>
      </div>
      <canvas class="kpi-spark" id="avgSpark"></canvas>
    </div>

    <!-- Centers -->
    <div class="centers-grid" id="centersGrid"></div>

  </div>
</div>

<!-- Modal -->
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-hdr-title" id="modalTitle">—</span>
      <div class="modal-hdr-actions">
        <button class="modal-export-btn" id="modalExportBtn">تصدير Excel</button>
        <button class="modal-close" onclick="closeModal()">✕ إغلاق</button>
      </div>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const WEBHOOK = 'https://n8n.thelpw.com/webhook/masakenlocation';

const FORMS = [
  { key:'ist', label:'استقبال', full:'استمارة استقبال مكة المكرمة / المدينة المنورة (ادارة امتثال)', cls:'ist', badgeCls:'cbadge-ist', dotCls:'ctype-dot-ist', kpiCls:'kpi-istiqbal' },
  { key:'mas', label:'مشاعر',  full:'استمارة الزيارات الميدانية مشاعر (ادارة امتثال)',               cls:'mas', badgeCls:'cbadge-mas', dotCls:'ctype-dot-mas', kpiCls:'kpi-mashaer' },
  { key:'mug', label:'مغادرة', full:'استمارة المغادرة(ادارة امتثال)',                                cls:'mug', badgeCls:'cbadge-mug', dotCls:'ctype-dot-mug', kpiCls:'kpi-mughadara' },
];
const FORM_FULL_SET = new Set(FORMS.map(f=>f.full));

const ALL_CENTERS = [
  'مركز ضيافة مصر (101)','مركز ضيافة مصر (102)','مركز ضيافة مصر (103)',
  'مركز ضيافة مصر (105)','مركز ضيافة مصر (106)','مركز ضيافة مصر (107)',
  'مركز ضيافة مصر (108)','مركز ضيافة مصر (109)','مركز ضيافة مصر (110)',
  'مركز ضيافة باكستان (120)','مركز ضيافة باكستان (121)','مركز ضيافة باكستان (122)',
  'مركز ضيافة باكستان (123)','مركز ضيافة باكستان (124)','مركز ضيافة باكستان (125)',
  'مركز ضيافة باكستان (126)','مركز ضيافة باكستان (127)','مركز ضيافة باكستان (128)',
  'مركز ضيافة باكستان (129)','مركز ضيافة باكستان (130)','مركز ضيافة باكستان (131)',
  'مركز ضيافة باكستان (132)','مركز ضيافة باكستان (133)','مركز ضيافة باكستان (134)',
  'مركز ضيافة باكستان (135)','مركز ضيافة باكستان (136)','مركز ضيافة باكستان (137)',
  'مركز ضيافة باكستان (138)','مركز ضيافة باكستان (139)','مركز ضيافة باكستان (140)',
  'مركز ضيافة باكستان (141)','مركز ضيافة باكستان (142)','مركز ضيافة باكستان (143)',
  'مركز ضيافة باكستان (144)','مركز ضيافة باكستان (145)','مركز ضيافة باكستان (146)',
  'مركز ضيافة باكستان (147)','مركز ضيافة باكستان (148)',
  'مركز ضيافة النيجر (150)','مركز ضيافة النيجر (151)',
  'مركز ضيافة النيجر (152)','مركز ضيافة النيجر (153)',
];

let allData=[], filteredData=[];
let _modalRows=[];

// ── Helpers ──────────────────────────────────────────────────────────────────
function parseDate(s){
  if(!s) return null;
  s=String(s).trim();
  // "M/D/YYYY HH:MM" or "M/D/YYYY"
  const dt=s.split(' ')[0];
  const p=dt.split('/');
  if(p.length===3) return `${p[2]}-${p[0].padStart(2,'0')}-${p[1].padStart(2,'0')}`;
  return null;
}
function fmtDate(s){
  if(!s) return '—';
  const d=parseDate(s);
  if(!d) return s;
  const [y,m,dd]=d.split('-');
  return `${dd}/${m}/${y}`;
}
function pctFmt(v){ return v==null?'—':Math.round(v*100)+'%'; }
function avgScore(arr){ if(!arr.length) return null; return arr.reduce((s,r)=>s+(r['النسبة']||0),0)/arr.length; }
function pctPill(v){
  if(v==null) return '<span class="pct-pill pct-lo">—</span>';
  const p=Math.round(v*100);
  const cls=p>=80?'pct-hi':p>=50?'pct-mid':'pct-lo';
  return `<span class="pct-pill ${cls}">${p}%</span>`;
}
function formByFull(full){ return FORMS.find(f=>f.full===full); }

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadData(){
  const r=await fetch(WEBHOOK);
  if(!r.ok) throw new Error('fetch failed');
  const d=await r.json();
  return (Array.isArray(d)?d:[d])
    .filter(r=>FORM_FULL_SET.has(r['اسم القالب']) && r['فريق الضيافة']);
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init(){
  try{
    allData=await loadData();
  }catch(e){
    document.getElementById('loadMsg').textContent='⚠️ خطأ في تحميل البيانات.';
    return;
  }

  // Populate center dropdown
  const sel=document.getElementById('fCenter');
  ALL_CENTERS.forEach(c=>{
    const o=document.createElement('option');
    o.value=o.textContent=c;
    sel.appendChild(o);
  });

  filteredData=[...allData];
  document.getElementById('loadMsg').style.display='none';
  document.getElementById('dash').style.display='block';
  renderAll();
})();

// ── Filter ───────────────────────────────────────────────────────────────────
function applyFilter(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const loc=document.getElementById('fLoc').value;
  const center=document.getElementById('fCenter').value;
  filteredData=allData.filter(r=>{
    const d=parseDate(r['التاريخ']);
    if(from&&d&&d<from) return false;
    if(to&&d&&d>to) return false;
    if(loc&&r['الموقع']!==loc) return false;
    if(center&&r['فريق الضيافة']!==center) return false;
    return true;
  });
  renderAll();
}
function clearFilter(){
  ['fFrom','fTo','fLoc','fCenter'].forEach(id=>{document.getElementById(id).value='';});
  filteredData=[...allData];
  renderAll();
}

// ── Render all ───────────────────────────────────────────────────────────────
function renderAll(){
  renderKPIs();
  renderCenters();
}

// ── KPI cards ────────────────────────────────────────────────────────────────
// ── Sparkline ────────────────────────────────────────────────────────────────
function dailyCounts(rows){
  const map={};
  rows.forEach(r=>{const d=parseDate(r['التاريخ']);if(d){map[d]=(map[d]||0)+1;}});
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
}
function dailyAvgScore(rows){
  const map={};
  rows.forEach(r=>{const d=parseDate(r['التاريخ']);if(d){if(!map[d])map[d]=[];map[d].push(r['النسبة']||0);}});
  return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0])).map(([d,vals])=>[d,vals.reduce((s,v)=>s+v,0)/vals.length]);
}
function drawSparkline(canvas, points, color, fillAlpha=0.18){
  const W=canvas.offsetWidth||canvas.parentElement.offsetWidth||300;
  canvas.width=W; canvas.height=52;
  if(!points||points.length<2) return;
  const vals=points.map(p=>p[1]);
  const mn=Math.min(...vals), mx=Math.max(...vals);
  const range=mx-mn||1;
  const pad=6;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,52);
  const xs=points.map((_,i)=>pad+(W-2*pad)*i/(points.length-1));
  const ys=points.map(p=>52-pad-(52-2*pad)*(p[1]-mn)/range);
  // Fill
  const grad=ctx.createLinearGradient(0,0,0,52);
  grad.addColorStop(0,color.replace(')',`,${fillAlpha})`).replace('rgb','rgba'));
  grad.addColorStop(1,color.replace(')',',0)').replace('rgb','rgba'));
  ctx.beginPath();
  ctx.moveTo(xs[0],ys[0]);
  for(let i=1;i<xs.length;i++){
    const cpx=(xs[i-1]+xs[i])/2;
    ctx.bezierCurveTo(cpx,ys[i-1],cpx,ys[i],xs[i],ys[i]);
  }
  ctx.lineTo(xs[xs.length-1],52);
  ctx.lineTo(xs[0],52);
  ctx.closePath();
  ctx.fillStyle=grad;
  ctx.fill();
  // Line
  ctx.beginPath();
  ctx.moveTo(xs[0],ys[0]);
  for(let i=1;i<xs.length;i++){
    const cpx=(xs[i-1]+xs[i])/2;
    ctx.bezierCurveTo(cpx,ys[i-1],cpx,ys[i],xs[i],ys[i]);
  }
  ctx.strokeStyle=color;
  ctx.lineWidth=2;
  ctx.stroke();
}

function renderKPIs(){
  const COLORS={ist:'rgb(138,173,218)',mas:'rgb(201,168,76)',mug:'rgb(77,184,200)'};
  const row=document.getElementById('kpiRow');
  row.innerHTML=FORMS.map(f=>{
    const rows=filteredData.filter(r=>r['اسم القالب']===f.full);
    const cnt=rows.length;
    const avg=avgScore(rows);
    const pct=avg!=null?Math.round(avg*100)+'%':'—';
    return `<div class="kpi-card ${f.kpiCls}" onclick="showModal('${f.label}',filterByForm(filteredData,'${f.full}'))">
      <div class="kpi-full-name">${f.full}</div>
      <div class="kpi-count">${cnt}</div>
      <div class="kpi-pct">${pct}</div>
      <canvas class="kpi-spark" id="spark_${f.key}"></canvas>
    </div>`;
  }).join('');
  // Draw sparklines after DOM update
  requestAnimationFrame(()=>{
    FORMS.forEach(f=>{
      const rows=filteredData.filter(r=>r['اسم القالب']===f.full);
      const pts=dailyCounts(rows);
      const cv=document.getElementById('spark_'+f.key);
      if(cv) drawSparkline(cv,pts,COLORS[f.key]);
    });
    // Average sparkline
    const pts=dailyAvgScore(filteredData);
    const avgCv=document.getElementById('avgSpark');
    if(avgCv) drawSparkline(avgCv,pts,'rgb(201,168,76)',0.12);
    // Average value
    const all=avgScore(filteredData);
    document.getElementById('avgVal').textContent=all!=null?Math.round(all*100)+'%':'—';
  });
}

// ── Center cards ─────────────────────────────────────────────────────────────
function renderCenters(){
  const grid=document.getElementById('centersGrid');
  // Determine which centers to show: if center filter active, only that center
  const centerFilter=document.getElementById('fCenter').value;
  const centers=centerFilter?[centerFilter]:ALL_CENTERS;

  grid.innerHTML=centers.map(cname=>{
    const cRows=filteredData.filter(r=>r['فريق الضيافة']===cname);
    const badges=FORMS.map(f=>{
      const cnt=cRows.filter(r=>r['اسم القالب']===f.full).length;
      return `<button class="cbadge ${f.badgeCls}${cnt===0?' zero':''}"
        onclick="event.stopPropagation();showModal('${cname} — ${f.label}',filterByFormAndCenter(filteredData,'${f.full}','${cname.replace(/'/g,"\\'")}'))"
        title="${f.label}">${cnt}</button>`;
    }).join('');

    const bodyRows=FORMS.map(f=>{
      const fRows=cRows.filter(r=>r['اسم القالب']===f.full);
      const cnt=fRows.length;
      const avg=avgScore(fRows);
      const zero=cnt===0?' ctype-zero':'';
      return `<div class="ctype-row${zero}" onclick="showModal('${cname} — ${f.label}',filterByFormAndCenter(filteredData,'${f.full}','${cname.replace(/'/g,"\\'")}'))">
        <div class="ctype-dot ${f.dotCls}"></div>
        <div class="ctype-name">${f.label}</div>
        <div class="ctype-stats">
          <div class="ctype-cnt">${cnt}</div>
          <div class="ctype-pct">${cnt?pctFmt(avg):'—'}</div>
        </div>
      </div>`;
    }).join('');

    const id='c_'+cname.replace(/[^a-zA-Z0-9]/g,'_');
    return `<div class="ccard">
      <div class="ccard-hdr" onclick="toggleCenter('${id}')">
        <div class="ccard-name">${cname}</div>
        <div class="ccard-badges">${badges}</div>
        <span class="carrow" id="arr_${id}">▼</span>
      </div>
      <div class="ccard-body" id="${id}">${bodyRows}</div>
    </div>`;
  }).join('');
}

function toggleCenter(id){
  const body=document.getElementById(id);
  const arr=document.getElementById('arr_'+id);
  if(!body) return;
  body.classList.toggle('open');
  arr.classList.toggle('open');
}

// ── Filter helpers ────────────────────────────────────────────────────────────
function filterByForm(rows,full){ return rows.filter(r=>r['اسم القالب']===full); }
function filterByFormAndCenter(rows,full,center){ return rows.filter(r=>r['اسم القالب']===full&&r['فريق الضيافة']===center); }

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(title,rows){
  _modalRows=rows;
  document.getElementById('modalTitle').textContent=`${title} (${rows.length})`;
  document.getElementById('modalBody').innerHTML=rows.length?buildTable(rows):'<div class="no-data">لا توجد بيانات</div>';
  document.getElementById('modalExportBtn').onclick=()=>doExport(rows,title);
  document.getElementById('modalOv').classList.add('open');
}
function closeModal(){ document.getElementById('modalOv').classList.remove('open'); }

let _sortCol=1, _sortAsc=false;  // default: sort by date desc

const COLS=[
  {label:'#',        key:'_idx',    sortable:false},
  {label:'التاريخ', key:'التاريخ', sortable:true},
  {label:'نوع الاستمارة', key:'اسم القالب', sortable:true},
  {label:'مركز الضيافة', key:'فريق الضيافة', sortable:true},
  {label:'الموقع',  key:'الموقع',  sortable:true},
  {label:'النسبة',  key:'النسبة',  sortable:true},
];

function sortRows(rows){
  const col=COLS[_sortCol];
  if(!col||!col.sortable) return [...rows];
  return [...rows].sort((a,b)=>{
    let va=a[col.key], vb=b[col.key];
    if(col.key==='التاريخ'){va=parseDate(va)||'';vb=parseDate(vb)||'';}
    if(col.key==='النسبة'){va=va||0;vb=vb||0;}
    va=String(va||''); vb=String(vb||'');
    const c=va.localeCompare(vb,'ar');
    return _sortAsc?c:-c;
  });
}

function buildTable(rows){
  const sorted=sortRows(rows);
  const ths=COLS.map((c,i)=>{
    if(!c.sortable) return `<th>${c.label}</th>`;
    const isSorted=_sortCol===i;
    const arrow=isSorted?(_sortAsc?'▲':'▼'):'⇅';
    return `<th class="${isSorted?'sorted':''}" onclick="sortTable(${i})"><span class="sort-arrow">${arrow}</span>${c.label}</th>`;
  }).join('');
  const trs=sorted.map((r,i)=>`<tr>
    <td>${i+1}</td>
    <td style="white-space:nowrap">${fmtDate(r['التاريخ'])}</td>
    <td class="txt">${r['اسم القالب']||'—'}</td>
    <td class="txt">${r['فريق الضيافة']||'—'}</td>
    <td>${r['الموقع']||'—'}</td>
    <td>${pctPill(r['النسبة'])}</td>
  </tr>`).join('');
  return `<table class="mtable"><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
}

function sortTable(colIdx){
  if(_sortCol===colIdx){ _sortAsc=!_sortAsc; }
  else { _sortCol=colIdx; _sortAsc=true; }
  document.getElementById('modalBody').innerHTML=_modalRows.length?buildTable(_modalRows):'<div class="no-data">لا توجد بيانات</div>';
}

// ── Export ────────────────────────────────────────────────────────────────────
async function doExport(rows, sheetTitle){
  if(!rows||!rows.length){alert('لا توجد بيانات');return;}
  const btn=document.getElementById('exportBtn');
  const prevTxt=btn.textContent;
  btn.disabled=true;btn.textContent='⏳ جاري التصدير...';
  try{
    const wb=new ExcelJS.Workbook();
    wb.creator='Al Rajhi';wb.views=[{rightToLeft:true}];
    const ws=wb.addWorksheet('الاستمارات',{views:[{rightToLeft:true,state:'frozen',ySplit:2}],properties:{defaultRowHeight:20}});

    ws.mergeCells('A1:F1');
    const t=ws.getCell('A1');
    t.value='الاستمارات — إدارة الامتثال والالتزام — موسم الحج 1447';
    t.font={bold:true,size:12,color:{argb:'FFC9A84C'},name:'Tajawal'};
    t.alignment={horizontal:'center'};
    t.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1B3A6B'}};
    ws.getRow(1).height=26;

    const hdrs=['ID','التاريخ','نوع الاستمارة','مركز الضيافة','الموقع','النسبة %'];
    const hRow=ws.addRow(hdrs);
    hRow.eachCell(cell=>{
      cell.font={bold:true,color:{argb:'FFC9A84C'},name:'Tajawal',size:10};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1B3A6B'}};
      cell.alignment={horizontal:'center'};
      cell.border={bottom:{style:'thin',color:{argb:'FFC9A84C'}}};
    });

    const sorted=[...rows].sort((a,b)=>{
      const da=parseDate(a['التاريخ'])||'';
      const db=parseDate(b['التاريخ'])||'';
      return da.localeCompare(db);
    });
    sorted.forEach(r=>{
      const row=ws.addRow([
        r['ID']||'',
        fmtDate(r['التاريخ']),
        formByFull(r['اسم القالب'])?.label||r['اسم القالب'],
        r['فريق الضيافة']||'',
        r['الموقع']||'',
        r['النسبة']!=null?Math.round(r['النسبة']*100):''
      ]);
      row.eachCell(cell=>{
        cell.font={name:'Tajawal',size:10};
        cell.alignment={horizontal:'center'};
      });
    });

    [8,14,28,20,16,10].forEach((w,i)=>{ws.getColumn(i+1).width=w;});

    const buf=await wb.xlsx.writeBuffer();
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'}));
    a.download=`الاستمارات_${new Date().toISOString().slice(0,10)}.xlsx`;
    a.click();
  }catch(e){alert('فشل التصدير');}
  finally{btn.disabled=false;btn.textContent=prevTxt;}
}
</script>

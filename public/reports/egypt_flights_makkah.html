<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>وصول رحلات مصر إلى مكة المكرمة</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{max-width:100%;overflow-x:hidden}
body{background:#0a1628;color:#e8e0d0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh;max-width:100%;overflow-x:hidden}
button,input,select,textarea{min-width:0;max-width:100%}
.page-header{background:linear-gradient(135deg,#0d1f3c 0%,#1a3a6b 60%,#0d1f3c 100%);border-bottom:3px solid #c9a84c;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-logo{width:52px;height:52px;border-radius:8px;background:#c9a84c;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#0d1f3c;flex-shrink:0}
.header-text h1{font-size:1.35rem;color:#c9a84c;font-weight:700}
.header-text p{font-size:0.78rem;color:#8a9fc0;margin-top:2px}
.header-badge{margin-right:auto;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:8px 16px;text-align:center}
.header-badge .badge-val{font-size:1.4rem;font-weight:700;color:#c9a84c}
.header-badge .badge-lbl{font-size:0.7rem;color:#8a9fc0}
.refresh-btn{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:7px 14px;color:#c9a84c;font-size:0.8rem;cursor:pointer;transition:background .15s;font-family:inherit}
.refresh-btn:hover{background:rgba(201,168,76,.25)}
.kpi-strip{display:flex;gap:12px;padding:16px 24px;background:rgba(13,31,60,.6);border-bottom:1px solid rgba(201,168,76,.15);flex-wrap:wrap}
.kpi{flex:1;min-width:140px;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:12px 16px;text-align:center}
.kpi-val{font-size:1.5rem;font-weight:700;color:#c9a84c}
.kpi-lbl{font-size:0.72rem;color:#8a9fc0;margin-top:3px}
.legend{display:flex;gap:8px;align-items:center;padding:12px 24px;flex-wrap:wrap}
.legend-title{font-size:0.7rem;color:#5a7090;margin-left:4px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.65rem;color:#8a9fc0}
.legend-swatch{width:14px;height:14px;border-radius:3px}
.cal-wrap{padding:20px 24px}
.month-block{margin-bottom:28px}
.month-title{font-size:1rem;color:#c9a84c;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,.2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-name{text-align:center;font-size:0.68rem;color:#5a7090;padding:4px 0;font-weight:600}
.cal-cell{border-radius:8px;padding:8px 6px;border:1px solid transparent;min-height:72px;display:flex;flex-direction:column;gap:3px;transition:transform .12s,box-shadow .12s}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.no-data{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
.cal-cell.no-data .cell-day{color:#3a5070}
.cal-cell.has-data{cursor:pointer}
.cal-cell.has-data:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:2}
.heat-1{background:rgba(201,168,76,.10);border-color:rgba(201,168,76,.25)}
.heat-2{background:rgba(201,168,76,.22);border-color:rgba(201,168,76,.4)}
.heat-3{background:rgba(201,168,76,.38);border-color:rgba(201,168,76,.6)}
.heat-4{background:rgba(255,140,0,.45);border-color:rgba(255,140,0,.7)}
.heat-5{background:rgba(220,60,40,.55);border-color:rgba(220,60,40,.8)}
.cell-day{font-size:0.85rem;font-weight:700;color:#c9a84c;line-height:1}
.cell-hijri{font-size:0.6rem;color:#7a9ab8;line-height:1}
.cell-pilgrims{font-size:0.72rem;font-weight:600;color:#e8e0d0;margin-top:auto}
.cell-rec{font-size:0.6rem;color:#8a9fc0}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#0d1f3c;border:2px solid #c9a84c;border-radius:14px;width:100%;max-width:740px;max-height:90vh;overflow-y:auto;animation:si .2s ease}
@keyframes si{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{background:linear-gradient(135deg,#0d1f3c,#1a3a6b);padding:18px 20px;border-bottom:2px solid #c9a84c;position:sticky;top:0;z-index:1}
.modal-head h2{font-size:1.1rem;color:#c9a84c}
.modal-head p{font-size:0.78rem;color:#8a9fc0;margin-top:3px}
.modal-close{position:absolute;top:14px;left:16px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:4px 10px;cursor:pointer;color:#c9a84c;font-size:0.9rem}
.modal-kpis{display:flex;gap:10px;padding:14px 20px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.07);flex-wrap:wrap}
.m-kpi{flex:1;min-width:90px;text-align:center}
.m-kpi-val{font-size:1.1rem;font-weight:700;color:#c9a84c}
.m-kpi-lbl{font-size:0.65rem;color:#8a9fc0}
.grp-list{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.grp-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.grp-card.open .grp-arrow{transform:rotate(180deg)}
.grp-header{padding:10px 12px;cursor:pointer;transition:background .15s}
.grp-header:hover{background:rgba(201,168,76,.08)}
.grp-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.grp-company{font-size:0.88rem;font-weight:700;color:#c9a84c}
.grp-flight{font-size:0.72rem;background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.3);border-radius:4px;padding:1px 7px;color:#7ab8ff}
.grp-status{font-size:0.68rem;border-radius:4px;padding:1px 7px;border:1px solid}
.grp-status.confirmed{background:rgba(52,168,83,.12);border-color:rgba(52,168,83,.35);color:#5cb85c}
.grp-status.other{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15);color:#aaa}
.grp-arrow{font-size:0.7rem;color:#8a9fc0;margin-right:auto;transition:transform .15s}
.grp-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:0.68rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:2px 8px;color:#aaa}
.grp-body{display:none;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07)}
.grp-card.open .grp-body{display:block}
.drow{display:flex;gap:8px;margin-bottom:5px;font-size:0.78rem}
.dlbl{color:#8a9fc0;flex-shrink:0;width:110px}
.dval{color:#e8e0d0}
.map-btn{display:inline-flex;align-items:center;gap:5px;margin-top:6px;margin-left:6px;background:rgba(52,168,83,.12);border:1px solid rgba(52,168,83,.35);border-radius:6px;padding:5px 12px;color:#5cb85c;font-size:0.78rem;text-decoration:none;transition:background .15s}
.map-btn:hover{background:rgba(52,168,83,.25)}
/* Loading */
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:#8a9fc0}
.spinner{width:40px;height:40px;border:3px solid rgba(201,168,76,.2);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-state{padding:40px 24px;text-align:center;color:#e57373}
@media(max-width:580px){.page-header{padding:16px 14px}.header-badge{margin-right:0;width:100%}.kpi-strip{gap:8px;padding:12px 14px}.legend{padding:12px 14px}.cal-wrap{padding:14px 10px}.cal-cell{min-height:58px;padding:5px 3px}.cell-day{font-size:0.75rem}}
</style>
</head>
<body>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head">
      <button class="modal-close" onclick="closeModal()">✕ إغلاق</button>
      <h2 id="m-title">—</h2><p id="m-sub">—</p>
    </div>
    <div class="modal-kpis">
      <div class="m-kpi"><div class="m-kpi-val" id="mk-pilgrims">—</div><div class="m-kpi-lbl">الحجاج</div></div>
      <div class="m-kpi"><div class="m-kpi-val" id="mk-flights">—</div><div class="m-kpi-lbl">الرحلات</div></div>
      <div class="m-kpi"><div class="m-kpi-val" id="mk-centers">—</div><div class="m-kpi-lbl">المراكز</div></div>
    </div>
    <div class="grp-list" id="grp-list"></div>
  </div>
</div>

<div class="page-header">
  <div class="header-logo">ر</div>
  <div class="header-text">
    <h1>وصول رحلات مصر إلى مكة المكرمة</h1>
    <p>بيانات وصول حجاج مصر من جوجل شيتس — تُحدَّث تلقائياً</p>
  </div>
  <button class="refresh-btn" onclick="loadData()" id="refresh-btn">↻ تحديث</button>
  <div class="header-badge">
    <div class="badge-val" id="hdr-total">—</div>
    <div class="badge-lbl">إجمالي الحجاج</div>
  </div>
</div>

<div class="kpi-strip">
  <div class="kpi"><div class="kpi-val" id="kpi-peak-date">—</div><div class="kpi-lbl">يوم الذروة</div></div>
  <div class="kpi"><div class="kpi-val" id="kpi-peak-count">—</div><div class="kpi-lbl">حجاج يوم الذروة</div></div>
  <div class="kpi"><div class="kpi-val" id="kpi-days">—</div><div class="kpi-lbl">أيام نشطة</div></div>
</div>

<div class="legend">
  <span class="legend-title">كثافة الوصول:</span>
  <div class="legend-item"><div class="legend-swatch heat-1"></div><span>منخفض</span></div>
  <div class="legend-item"><div class="legend-swatch heat-2"></div><span>متوسط</span></div>
  <div class="legend-item"><div class="legend-swatch heat-3"></div><span>مرتفع</span></div>
  <div class="legend-item"><div class="legend-swatch heat-4"></div><span>عالي</span></div>
  <div class="legend-item"><div class="legend-swatch heat-5"></div><span>ذروة</span></div>
</div>

<div class="cal-wrap" id="cal-wrap"></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/1xxvxztMizOhMZwMCxHpGCttH9bI6GG4lu0uabhmteoU/export?format=csv&gid=106631187';

// Hijri 1447: 1 Dhul Qa'dah = Apr 18, 1 Dhul Hijjah = May 18
const H_DQ = new Date('2026-04-18T00:00:00');
const H_DH = new Date('2026-05-18T00:00:00');
const MH = ['محرم','صفر','ربيع الأول','ربيع الثاني','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
function toHijri(iso) {
  const d = new Date(iso + 'T00:00:00'), ms = 86400000;
  if (d >= H_DH) return (Math.floor((d - H_DH) / ms) + 1) + ' ' + MH[11] + ' 1447';
  if (d >= H_DQ) return (Math.floor((d - H_DQ) / ms) + 1) + ' ' + MH[10] + ' 1447';
  return '';
}

const DN = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MN = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function fmt(n) { return Number(n).toLocaleString('en-US'); }

function parseDate(s) {
  // M/D/YYYY or MM/DD/YYYY
  if (!s) return null;
  const p = s.trim().split('/');
  if (p.length !== 3) return null;
  const m = parseInt(p[0], 10), d = parseInt(p[1], 10), y = parseInt(p[2], 10);
  if (isNaN(m) || isNaN(d) || isNaN(y)) return null;
  return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/);
  const result = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // Simple CSV parse (handles quoted fields)
    const cols = [];
    let cur = '', inQ = false;
    for (let c = 0; c < line.length; c++) {
      const ch = line[c];
      if (ch === '"') { inQ = !inQ; }
      else if (ch === ',' && !inQ) { cols.push(cur); cur = ''; }
      else { cur += ch; }
    }
    cols.push(cur);
    result.push(cols);
  }
  return result;
}

// Columns: 0=عدد الحجاج, 1=اسم الشركة, 2=تاريخ القدوم ميلادي, 3=رقم الرحلة, 4=حالة الرحلة, 5=مدينة الوصول, 6=وقت الوصول, 7=رقم المركز, 8=اسم السكن, 9=موقع السكن, 10=موقع السكن 2
function buildDayData(rows) {
  const DAY_DATA = {};
  for (const cols of rows) {
    const dateStr = cols[2] ? cols[2].trim() : '';
    const iso = parseDate(dateStr);
    if (!iso) continue;
    const pilgrims = parseInt((cols[0] || '').replace(/,/g,''), 10) || 0;
    const flight = {
      pilgrims,
      company:  (cols[1] || '').trim(),
      flightNo: (cols[3] || '').trim(),
      status:   (cols[4] || '').trim(),
      city:     (cols[5] || '').trim(),
      time:     (cols[6] || '').trim(),
      center:   (cols[7] || '').trim(),
      accom:    (cols[8] || '').trim(),
      loc1:     (cols[9] || '').trim(),
      loc2:     (cols[10] || '').trim(),
    };
    if (!DAY_DATA[iso]) DAY_DATA[iso] = { pilgrims: 0, flights: [] };
    DAY_DATA[iso].pilgrims += pilgrims;
    DAY_DATA[iso].flights.push(flight);
  }
  return DAY_DATA;
}

function heatClass(n, maxCount) {
  if (!n) return '';
  const r = n / maxCount;
  if (r < 0.2) return 'heat-1';
  if (r < 0.4) return 'heat-2';
  if (r < 0.65) return 'heat-3';
  if (r < 0.85) return 'heat-4';
  return 'heat-5';
}

function buildMonth(yr, mo, DAY_DATA, maxCount) {
  const bl = document.createElement('div'); bl.className = 'month-block';
  const ti = document.createElement('div'); ti.className = 'month-title';
  ti.textContent = MN[mo] + ' ' + yr; bl.appendChild(ti);
  const gr = document.createElement('div'); gr.className = 'cal-grid';
  DN.forEach(n => { const d = document.createElement('div'); d.className = 'day-name'; d.textContent = n; gr.appendChild(d); });
  const fw = new Date(yr, mo, 1).getDay();
  for (let i = 0; i < fw; i++) { const e = document.createElement('div'); e.className = 'cal-cell empty'; gr.appendChild(e); }
  const dim = new Date(yr, mo + 1, 0).getDate();
  for (let day = 1; day <= dim; day++) {
    const iso = `${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const info = DAY_DATA[iso];
    const hj = toHijri(iso);
    const cell = document.createElement('div');
    cell.className = info ? 'cal-cell has-data ' + heatClass(info.pilgrims, maxCount) : 'cal-cell no-data';
    if (info) cell.onclick = () => openModal(iso, DAY_DATA);
    cell.innerHTML = `<div class="cell-day">${day}</div>
      <div class="cell-hijri">${hj ? hj.split(' ').slice(0,2).join(' ') : ''}</div>
      ${info ? `<div class="cell-pilgrims">${fmt(info.pilgrims)} حاج</div>
      <div class="cell-rec">${info.flights.length} رحلة</div>` : ''}`;
    gr.appendChild(cell);
  }
  bl.appendChild(gr); return bl;
}

function buildCalendar(DAY_DATA) {
  const wrap = document.getElementById('cal-wrap');
  wrap.innerHTML = '';
  const isos = Object.keys(DAY_DATA).sort();
  if (!isos.length) { wrap.innerHTML = '<div style="padding:40px;text-align:center;color:#8a9fc0">لا توجد بيانات</div>'; return; }
  const maxCount = Math.max(...Object.values(DAY_DATA).map(v => v.pilgrims));
  const first = new Date(isos[0] + 'T00:00:00'), last = new Date(isos[isos.length-1] + 'T00:00:00');
  let ym = { year: first.getFullYear(), month: first.getMonth() };
  const yme = { year: last.getFullYear(), month: last.getMonth() };
  while (true) {
    wrap.appendChild(buildMonth(ym.year, ym.month, DAY_DATA, maxCount));
    if (ym.year === yme.year && ym.month === yme.month) break;
    ym.month++; if (ym.month > 11) { ym.month = 0; ym.year++; }
  }
}

function updateKPIs(DAY_DATA) {
  const isos = Object.keys(DAY_DATA);
  const total = isos.reduce((s, k) => s + DAY_DATA[k].pilgrims, 0);
  const peak = isos.reduce((a, b) => DAY_DATA[a].pilgrims > DAY_DATA[b].pilgrims ? a : b, isos[0]);
  document.getElementById('hdr-total').textContent = fmt(total);
  document.getElementById('kpi-peak-count').textContent = fmt(DAY_DATA[peak].pilgrims);
  document.getElementById('kpi-days').textContent = isos.length;
  const d = new Date(peak + 'T00:00:00');
  const g = d.toLocaleDateString('ar-SA-u-ca-gregory', { day: 'numeric', month: 'long' });
  const hj = toHijri(peak);
  document.getElementById('kpi-peak-date').textContent = g + (hj ? ' / ' + hj.split(' ').slice(0,2).join(' ') : '');
}

let _DAY_DATA = {};

function openModal(iso, DAY_DATA) {
  const info = DAY_DATA[iso]; if (!info) return;
  const d = new Date(iso + 'T00:00:00');
  document.getElementById('m-title').textContent = d.toLocaleDateString('ar-SA-u-ca-gregory', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const hj = toHijri(iso);
  document.getElementById('m-sub').textContent = hj ? 'الموافق ' + hj + ' هـ' : '';
  document.getElementById('mk-pilgrims').textContent = fmt(info.pilgrims);
  document.getElementById('mk-flights').textContent = new Set(info.flights.map(f => f.flightNo).filter(Boolean)).size || info.flights.length;
  document.getElementById('mk-centers').textContent = new Set(info.flights.map(f => f.center).filter(Boolean)).size;
  document.getElementById('grp-list').innerHTML = info.flights.map(f => {
    const statusClass = f.status && f.status.includes('مؤكد') ? 'confirmed' : 'other';
    const loc1Btn = f.loc1 ? `<a class="map-btn" href="${f.loc1}" target="_blank">📍 موقع السكن</a>` : '';
    const loc2Btn = f.loc2 ? `<a class="map-btn" href="${f.loc2}" target="_blank">📍 موقع بديل</a>` : '';
    const cityRow = f.city ? `<div class="drow"><div class="dlbl">مدينة الوصول</div><div class="dval">${f.city}</div></div>` : '';
    return `<div class="grp-card" onclick="toggleCard(this)">
      <div class="grp-header">
        <div class="grp-top">
          <span class="grp-company">${f.company || '—'}</span>
          ${f.flightNo ? `<span class="grp-flight">${f.flightNo}</span>` : ''}
          ${f.status ? `<span class="grp-status ${statusClass}">${f.status}</span>` : ''}
          <span class="grp-arrow">▼</span>
        </div>
        <div class="grp-meta">
          ${f.time ? `<span class="chip">🕐 ${f.time}</span>` : ''}
          ${f.center ? `<span class="chip">مركز ${f.center}</span>` : ''}
          ${f.pilgrims ? `<span class="chip">${fmt(f.pilgrims)} حاج</span>` : ''}
        </div>
      </div>
      <div class="grp-body">
        ${cityRow}
        ${f.center ? `<div class="drow"><div class="dlbl">رقم المركز</div><div class="dval">${f.center}</div></div>` : ''}
        ${f.accom ? `<div class="drow"><div class="dlbl">اسم السكن</div><div class="dval">${f.accom}</div></div>` : ''}
        ${f.pilgrims ? `<div class="drow"><div class="dlbl">عدد الحجاج</div><div class="dval">${fmt(f.pilgrims)}</div></div>` : ''}
        <div>${loc1Btn}${loc2Btn}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function toggleCard(el) { el.classList.toggle('open'); }

async function loadData() {
  const wrap = document.getElementById('cal-wrap');
  const btn = document.getElementById('refresh-btn');
  wrap.innerHTML = '<div class="loading-state"><div class="spinner"></div><div>جاري تحميل البيانات...</div></div>';
  btn.disabled = true; btn.textContent = '⏳ جاري التحديث...';
  document.getElementById('hdr-total').textContent = '—';
  document.getElementById('kpi-peak-date').textContent = '—';
  document.getElementById('kpi-peak-count').textContent = '—';
  document.getElementById('kpi-days').textContent = '—';
  try {
    const res = await fetch(CSV_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    _DAY_DATA = buildDayData(rows);
    if (Object.keys(_DAY_DATA).length === 0) {
      wrap.innerHTML = '<div class="error-state">لا توجد بيانات صالحة في الجدول</div>';
    } else {
      updateKPIs(_DAY_DATA);
      buildCalendar(_DAY_DATA);
    }
  } catch (e) {
    wrap.innerHTML = `<div class="error-state">⚠️ فشل تحميل البيانات<br><small style="color:#aaa;margin-top:8px;display:block">${e.message}</small><br><button onclick="loadData()" style="margin-top:12px;padding:8px 20px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:6px;color:#c9a84c;cursor:pointer;font-family:inherit">إعادة المحاولة</button></div>`;
  } finally {
    btn.disabled = false; btn.textContent = '↻ تحديث';
  }
}

loadData();
</script>
</body>
</html>

<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجل التقارير</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#1B3A6B;--deep-navy:#0C2550;--gold:#C9A84C;
  --text-light:#F5F0E8;--text-muted:#8AADDA;
  --card-bg:#1B2535;--card-border:#2E3D50;--dark-bg:#0F1923;
  --green:#4CAF8A;--red:#e74c3c;
}
html{max-width:100%;overflow-x:hidden;}
body{font-family:'Tajawal',sans-serif;background:var(--dark-bg);color:var(--text-light);min-height:100vh;direction:rtl;max-width:100%;overflow-x:hidden;}
button,input,select,textarea{min-width:0;max-width:100%;}
.main{max-width:min(1100px,100%);width:100%;margin:0 auto;padding:20px 16px;overflow-x:hidden;}

/* Header */
.page-hdr{background:var(--deep-navy);border-bottom:2px solid var(--gold);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.page-hdr-title{font-size:1rem;font-weight:700;color:var(--gold);}
.page-hdr-user{font-size:0.78rem;color:var(--text-muted);}
.export-day-btn{padding:7px 14px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:0.8rem;font-weight:700;cursor:pointer;border:none;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.35);color:var(--gold);transition:background .15s;}
.export-day-btn:hover{background:rgba(201,168,76,.28);}
.export-day-btn:disabled{opacity:.55;cursor:not-allowed;}



/* Filter */
.filter-bar{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:14px 16px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:flex-end;}
.filter-group{display:flex;flex-direction:column;gap:4px;}
.filter-label{font-size:0.72rem;color:var(--text-muted);font-weight:600;}
.filter-input{background:var(--deep-navy);border:1px solid var(--card-border);border-radius:8px;padding:7px 10px;color:var(--text-light);font-family:'Tajawal',sans-serif;font-size:0.83rem;outline:none;}
.filter-input:focus{border-color:var(--gold);}
.filter-btn{padding:8px 16px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:0.83rem;font-weight:600;cursor:pointer;border:none;transition:background .15s;}
.filter-apply{background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);color:var(--gold);}
.filter-apply:hover{background:rgba(201,168,76,.25);}
.filter-clear{background:rgba(255,255,255,.05);border:1px solid var(--card-border);color:var(--text-muted);}
.filter-clear:hover{border-color:var(--gold);color:var(--gold);}

/* Location group header */
.loc-group-hdr{font-size:0.78rem;font-weight:700;color:var(--text-muted);padding:10px 4px 6px;letter-spacing:.03em;border-bottom:1px solid var(--card-border);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.loc-group{margin-bottom:22px;}

/* Reports grid */
.reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.report-card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:12px;padding:16px;transition:border-color .15s;}
.report-card:hover{border-color:rgba(201,168,76,.3);}
.report-card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.report-card-date{font-size:0.82rem;color:var(--gold);font-weight:700;}
.report-type-badge{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:20px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);color:var(--gold);}
.report-card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.meta-chip{background:rgba(255,255,255,.05);border-radius:6px;padding:3px 9px;font-size:0.73rem;color:var(--text-muted);}
.meta-chip span{color:var(--text-light);font-weight:600;}
.report-card-actions{display:flex;gap:6px;flex-wrap:wrap;}
.act-btn{flex:1;padding:7px 8px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:0.75rem;font-weight:600;cursor:pointer;border:none;transition:background .15s;white-space:nowrap;}
.act-view{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.25);color:var(--gold);}
.act-view:hover{background:rgba(201,168,76,.22);}
.act-pdf{background:rgba(76,175,138,.1);border:1px solid rgba(76,175,138,.25);color:var(--green);}
.act-pdf:hover{background:rgba(76,175,138,.2);}
.act-del{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--red);}
.act-del:hover{background:rgba(192,57,43,.18);}

/* Empty / loading / footer */
.empty-state{text-align:center;padding:48px 0;color:var(--text-muted);}
.empty-state div{font-size:2.5rem;margin-bottom:10px;}
.loading{text-align:center;padding:32px;color:var(--text-muted);}
.results-footer{text-align:center;padding:16px 0 4px;font-size:0.8rem;color:var(--text-muted);}
.results-footer strong{color:var(--text-light);font-weight:700;}

/* Modal shared */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:none;align-items:center;justify-content:center;padding:16px;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:14px;width:100%;display:flex;flex-direction:column;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--card-border);}
.modal-title{font-size:0.95rem;font-weight:700;color:var(--gold);}
.modal-close{background:rgba(255,255,255,.07);border:1px solid var(--card-border);border-radius:6px;color:var(--text-muted);padding:4px 10px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:0.8rem;}
.modal-body{overflow-y:auto;padding:16px 18px;flex:1;}
.modal-footer{padding:12px 18px;border-top:1px solid var(--card-border);display:flex;gap:8px;justify-content:flex-end;}

/* View modal */
#viewModal .modal-box{max-width:760px;max-height:90vh;}
.modal-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--card-border);}
.modal-meta-item{display:flex;gap:5px;font-size:0.82rem;}
.modal-meta-lbl{color:var(--text-muted);}
.modal-meta-val{color:var(--text-light);font-weight:700;}
.msec{margin-bottom:14px;}
.msec-title{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:8px 8px 0 0;padding:8px 12px;font-size:0.85rem;font-weight:700;color:var(--gold);}
.msec-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
.msec-table th{background:rgba(255,255,255,.05);color:var(--text-muted);padding:6px 8px;text-align:center;border:1px solid var(--card-border);}
.msec-table td{padding:6px 8px;text-align:center;border:1px solid var(--card-border);color:var(--text-light);}
.msec-table tr:nth-child(even) td{background:rgba(255,255,255,.02);}

/* Delete confirm modal */
#deleteModal .modal-box{max-width:420px;}
.del-info{font-size:0.85rem;color:var(--text-muted);margin-bottom:14px;line-height:1.6;}
.del-info strong{color:var(--text-light);}
.del-pw-wrap{position:relative;}
.del-pw-wrap input{width:100%;background:var(--deep-navy);border:1px solid var(--card-border);border-radius:8px;padding:9px 12px;color:var(--text-light);font-family:'Tajawal',sans-serif;font-size:0.9rem;outline:none;}
.del-pw-wrap input:focus{border-color:var(--gold);}
.del-err{font-size:0.78rem;color:var(--red);margin-top:8px;min-height:18px;}
.btn-del-confirm{flex:1;padding:9px;background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.35);border-radius:8px;color:var(--red);font-family:'Tajawal',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;}
.btn-del-confirm:hover{background:rgba(192,57,43,.28);}
.btn-cancel{flex:1;padding:9px;background:rgba(255,255,255,.05);border:1px solid var(--card-border);border-radius:8px;color:var(--text-muted);font-family:'Tajawal',sans-serif;font-size:0.85rem;font-weight:600;cursor:pointer;}
.btn-cancel:hover{border-color:var(--gold);color:var(--gold);}

/* Edit button */
.act-edit{background:rgba(88,166,255,.08);border:1px solid rgba(88,166,255,.2);color:#7ab8ff;}
.act-edit:hover{background:rgba(88,166,255,.18);}
/* Edit password modal */
#editPwModal .modal-box{max-width:420px;}
/* Edit form modal */
#editFormModal .modal-box{max-width:680px;max-height:90vh;}
.edit-field-group{margin-bottom:14px;}
.edit-field-lbl{font-size:0.78rem;color:var(--text-muted);margin-bottom:4px;display:block;}
.edit-input{width:100%;background:var(--deep-navy);border:1px solid var(--card-border);border-radius:8px;padding:8px 12px;color:var(--text-light);font-family:'Tajawal',sans-serif;font-size:0.85rem;outline:none;}
.edit-input:focus{border-color:var(--gold);}
.edit-textarea{resize:vertical;min-height:54px;}
.edit-section-block{margin-bottom:16px;}
.edit-section-title{font-size:0.82rem;font-weight:700;color:var(--gold);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.15);border-radius:8px 8px 0 0;padding:7px 12px;margin-bottom:6px;}
.edit-entry-row{background:rgba(255,255,255,.03);border:1px solid var(--card-border);border-radius:0 0 8px 8px;padding:10px 12px;margin-bottom:8px;display:flex;flex-direction:column;gap:8px;}
.edit-entry-center{font-size:0.8rem;font-weight:600;color:var(--text-light);padding-bottom:6px;border-bottom:1px solid var(--card-border);}
.edit-entry-field{display:flex;flex-direction:column;gap:3px;}
.btn-edit-save{flex:1;padding:9px;background:rgba(76,175,138,.15);border:1px solid rgba(76,175,138,.35);border-radius:8px;color:var(--green);font-family:'Tajawal',sans-serif;font-size:0.85rem;font-weight:700;cursor:pointer;}
.btn-edit-save:hover{background:rgba(76,175,138,.28);}
.edit-note{font-size:0.73rem;color:var(--text-muted);font-style:italic;margin-bottom:8px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:10px;font-size:0.88rem;font-weight:600;z-index:9999;display:none;white-space:nowrap;}
.toast.show{display:block;animation:toastIn .25s ease;}
.toast.success{background:rgba(76,175,138,.2);border:1px solid rgba(76,175,138,.4);color:var(--green);}
.toast.error{background:rgba(192,57,43,.2);border:1px solid rgba(192,57,43,.4);color:var(--red);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(12px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

@media(max-width:620px){
  .page-hdr{padding:10px 14px;gap:10px;align-items:flex-start;}
  .export-day-btn{padding:8px 10px;font-size:.74rem;}
  .main{padding:14px 12px;}
  .filter-bar{display:grid;grid-template-columns:1fr 1fr;padding:12px;gap:8px;}
  .filter-group{min-width:0;}
  .filter-input{width:100%;}
  .filter-btn{width:100%;padding:9px 8px;}
  .reports-grid{grid-template-columns:1fr;}
  .report-card{padding:14px;}
  .report-card-hdr{align-items:flex-start;gap:8px;}
  .report-card-date{line-height:1.5;}
  .modal-overlay{padding:10px;align-items:flex-start;}
  #viewModal .modal-box{max-height:92vh;}
  .modal-hdr,.modal-body,.modal-footer{padding:12px;}
  .msec-table{display:block;overflow-x:auto;white-space:nowrap;}
  .toast{width:calc(100% - 24px);white-space:normal;text-align:center;}
}

/* Print */
@media print{
  .no-print{display:none!important;}
  body{background:white;color:#000;min-height:0!important;}
  @page{size:A4;margin:15mm 12mm;}
  .pdoc{font-family:'Tajawal',sans-serif;direction:rtl;color:#000;font-size:10pt;}
  .phdr{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:3px solid #1B3A6B;page-break-after:avoid;}
  .plogo{font-size:13pt;font-weight:800;color:#1B3A6B;}
  .plogo-en{font-size:8pt;color:#555;}
  .ptitle-main{font-size:15pt;font-weight:800;color:#1B3A6B;text-decoration:underline;}
  .ptitle-sub{font-size:9pt;color:#444;}
  .pmeta-row{display:flex;gap:18px;margin-bottom:10px;font-size:9pt;border-bottom:1px solid #C9A84C;padding-bottom:6px;}
  .pmeta-lbl{color:#666;}.pmeta-val{font-weight:700;color:#1B3A6B;}
  .preport-block{margin-bottom:14px;}
  .preport-hdr{background:#1B3A6B;color:#C9A84C;padding:5px 10px;font-size:9pt;font-weight:700;display:flex;justify-content:space-between;margin-bottom:4px;page-break-after:avoid;}
  .psec{margin-bottom:10px;page-break-inside:avoid;}
  .psec-title{background:#1B3A6B;color:#fff;text-align:center;font-size:9pt;font-weight:700;padding:4px;}
  .ptable{width:100%;border-collapse:collapse;font-size:8pt;}
  .ptable th{background:#C9A84C;color:#1B3A6B;font-weight:700;text-align:center;padding:4px;border:1px solid #1B3A6B;}
  .ptable td{text-align:center;padding:4px;border:1px solid #bbb;}
  .ptable tr:nth-child(even) td{background:#f7f7f7;}
  .ploc-divider{border-top:3px double #1B3A6B;margin:14px 0 8px;page-break-before:always;}
}
.print-only{display:none;}
</style>
</head>
<body>

<div class="no-print">

<div class="page-hdr">
  <div>
    <div class="page-hdr-title">سجل التقارير</div>
    <div class="page-hdr-user" id="userLabel"></div>
  </div>
  <button class="export-day-btn" id="exportCurrentBtn" onclick="doExportDay()">📤 تصدير النتائج</button>
</div>

<div class="main">

  <!-- Filter -->
  <div class="filter-bar">
    <div class="filter-group">
      <div class="filter-label">من تاريخ</div>
      <input type="date" class="filter-input" id="fFrom">
    </div>
    <div class="filter-group">
      <div class="filter-label">إلى تاريخ</div>
      <input type="date" class="filter-input" id="fTo">
    </div>
    <div class="filter-group" id="supFilterWrap" style="display:none">
      <div class="filter-label">المشرف</div>
      <select class="filter-input" id="fSupervisor" style="min-width:150px">
        <option value="">— الكل —</option>
      </select>
    </div>
    <div class="filter-group">
      <div class="filter-label">نوع التقرير</div>
      <select class="filter-input" id="fType" style="min-width:140px">
        <option value="">— الكل —</option>
        <option value="daily">التقرير اليومي</option>
        <option value="presence">التواجد</option>
      </select>
    </div>
    <button class="filter-btn filter-apply" onclick="applyFilter()">تطبيق</button>
    <button class="filter-btn filter-clear"  onclick="clearFilter()">مسح</button>
  </div>

  <!-- List -->
  <div id="reportsList"><div class="loading">⏳ جاري التحميل...</div></div>

</div><!-- main -->

<!-- ── View Modal ───────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="viewModal" onclick="closeViewModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title" id="modalTitle">عرض التقرير</span>
      <button class="modal-close" onclick="closeViewModal()">✕ إغلاق</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer no-print">
      <button class="act-btn act-pdf" onclick="printCurrentReport()">🖨️ طباعة PDF</button>
    </div>
  </div>
</div>

<!-- ── Delete Confirm Modal ─────────────────────────────────────────────────── -->
<div class="modal-overlay" id="deleteModal" onclick="closeDeleteModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">🗑 تأكيد الحذف</span>
      <button class="modal-close" onclick="closeDeleteModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="del-info">
        لحذف هذا التقرير، أدخل كلمة مرور المشرف:<br>
        <strong id="delSupName"></strong>
      </div>
      <div class="del-pw-wrap">
        <input type="password" id="delPwInput" placeholder="كلمة المرور"
          onkeydown="if(event.key==='Enter') confirmDelete()">
      </div>
      <div class="del-err" id="delErr"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeDeleteModal()">إلغاء</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">تأكيد الحذف</button>
    </div>
  </div>
</div>

<!-- ── Edit Password Modal ──────────────────────────────────────────────────── -->
<div class="modal-overlay" id="editPwModal" onclick="closeEditPwModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">✏️ تعديل التقرير</span>
      <button class="modal-close" onclick="closeEditPwModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="del-info">
        لتعديل هذا التقرير، أدخل كلمة مرور المشرف:<br>
        <strong id="editPwSupName"></strong>
      </div>
      <div class="del-pw-wrap">
        <input type="password" id="editPwInput" placeholder="كلمة المرور"
          onkeydown="if(event.key==='Enter') confirmEditPassword()">
      </div>
      <div class="del-err" id="editPwErr"></div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditPwModal()">إلغاء</button>
      <button class="btn-edit-save" onclick="confirmEditPassword()">تحقق والمتابعة</button>
    </div>
  </div>
</div>

<!-- ── Edit Form Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="editFormModal" onclick="closeEditFormModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-hdr">
      <span class="modal-title">✏️ تعديل التقرير</span>
      <button class="modal-close" onclick="closeEditFormModal()">✕ إغلاق</button>
    </div>
    <div class="modal-body" id="editFormBody"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeEditFormModal()">إلغاء</button>
      <button class="btn-edit-save" id="editSaveBtn" onclick="saveEdit()">حفظ التعديلات</button>
    </div>
  </div>
</div>

</div><!-- end no-print -->

<!-- Print view -->
<div class="print-only" id="printView"></div>

<div class="toast no-print" id="toast"></div>

<script>
const SB_URL = 'https://ectajbmqxucrrbyymbbp.supabase.co';

// ── URL params ────────────────────────────────────────────────────────────────
const _P        = new URLSearchParams(location.search);
const _name     = _P.get('name') ? decodeURIComponent(_P.get('name')) : '';
const _role     = _P.get('role') || 'supervisor';
const isAdmin   = _role === 'admin';
const isManager = _role === 'manager';
const canDelete = !isManager;

let _allReports = [];
let _pendingDeleteId   = null;
let _pendingDeleteSup  = null;
let _currentReport     = null;
let _pendingEditId     = null;
let _pendingEditSup    = null;
let _editReport        = null;
let _editEntries       = [];

// ── Supabase ──────────────────────────────────────────────────────────────────
async function sbGet(path){
  const r = await fetch(`${SB_URL}/rest/v1/${path}`,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
  return r.json();
}
async function sbDel(path){
  await fetch(`${SB_URL}/rest/v1/${path}`,{
    method:'DELETE',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
  });
}
async function sbPatch(path, body){
  await fetch(`${SB_URL}/rest/v1/${path}`,{
    method:'PATCH',
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(body)
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function init(){

// ── Load ──────────────────────────────────────────────────────────────────────
function buildReportsQuery(from, to, supervisor, rtype){
  let q = 'daily_reports?select=*&order=report_date.desc';
  if(supervisor) q += `&supervisor=eq.${encodeURIComponent(supervisor)}`;
  if(from) q += `&report_date=gte.${from}T00:00:00%2B03:00`;
  if(to)   q += `&report_date=lte.${to}T23:59:59%2B03:00`;
  if(rtype) q += `&report_type=eq.${rtype}`;
  return q;
}
async function fetchReports(from, to, supervisor, rtype){
  return await sbGet(buildReportsQuery(from, to, supervisor, rtype));
}
function getCurrentFilters(){
  return {
    from: document.getElementById('fFrom').value || '',
    to: document.getElementById('fTo').value || '',
    supervisor: (isAdmin||isManager) ? document.getElementById('fSupervisor').value || '' : '',
    rtype: document.getElementById('fType').value || '',
  };
}
async function loadReports(from, to, supervisor, rtype){
  document.getElementById('reportsList').innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
  try{
    // كل المستخدمين يشوفون كل التقارير
    _allReports = await fetchReports(from, to, supervisor, rtype);


    renderList(_allReports);
  }catch(e){
    document.getElementById('reportsList').innerHTML =
      `<div class="empty-state"><div>⚠️</div>خطأ في التحميل</div>`;
  }
}


// ── Sort ──────────────────────────────────────────────────────────────────────
function locationRank(location){
  return LOCATION_ORDER[location] || 99;
}
function periodRank(period){
  const raw = String(period||'').trim();
  if(PERIOD_ORDER[raw]) return PERIOD_ORDER[raw];
  const normalized = raw
    .replace(/[إأآ]/g,'ا')
    .replace(/\s+/g,' ')
    .replace(/^الفترة\s+/,'')
    .replace(/^فترة\s+/,'')
    .trim();
  if(['اولى','الاولى','اول','الاول'].includes(normalized)) return 1;
  if(['ثانية','الثانية','ثاني','الثاني'].includes(normalized)) return 2;
  if(['ثالثة','الثالثة','ثالث','الثالث'].includes(normalized)) return 3;
  if(normalized.includes('مشاعر')) return 4;
  return 99;
}
function compareLocationThenPeriod(aLocation, aPeriod, bLocation, bPeriod){
  const lo = locationRank(aLocation) - locationRank(bLocation);
  if(lo!==0) return lo;
  const ln = String(aLocation||'').localeCompare(String(bLocation||''), 'ar');
  if(ln!==0) return ln;
  const po = periodRank(aPeriod) - periodRank(bPeriod);
  if(po!==0) return po;
  return String(aPeriod||'').localeCompare(String(bPeriod||''), 'ar');
}
function sortReports(reports){
  return [...reports].sort((a,b)=>{
    const mainSort = compareLocationThenPeriod(a.location, a.period, b.location, b.period);
    if(mainSort!==0) return mainSort;
    return new Date(b.report_date) - new Date(a.report_date);
  });
}

// ── Render list ───────────────────────────────────────────────────────────────
function renderList(reports){
  const el = document.getElementById('reportsList');
  if(!reports.length){
    el.innerHTML = `<div class="empty-state"><div>📭</div>لا توجد تقارير</div>`;
    return;
  }
  const sorted = sortReports(reports);

  // تجميع حسب الموقع
  const groups = {};
  const groupOrder = [];
  sorted.forEach(r=>{
    const loc = r.location || 'غير محدد';
    if(!groups[loc]){ groups[loc]=[]; groupOrder.push(loc); }
    groups[loc].push(r);
  });

  const ZONE_ICONS = {'مكة المكرمة':'🕋','المدينة المنورة':'🕌','عرفة':'⛺','منى':'🏕️','مزدلفة':'🌙'};
  let html = '';
  groupOrder.forEach(loc=>{
    const icon = ZONE_ICONS[loc]||'📍';
    html += `<div class="loc-group">
      <div class="loc-group-hdr">${icon} ${loc} <span style="font-weight:400">(${groups[loc].length} تقرير)</span></div>
      <div class="reports-grid">${groups[loc].map(r=>reportCard(r)).join('')}</div>
    </div>`;
  });
  html += `<div class="results-footer">تم عرض <strong>${reports.length}</strong> ${reports.length===1?'تقرير':'تقارير'}</div>`;
  el.innerHTML = html;
}

function reportCard(r){
  const d  = new Date(r.report_date);
  const dt = d.toLocaleDateString('en-GB')+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  const rtype = r.report_type === 'presence' ? 'التواجد' : 'اليومي';
  return `
    <div class="report-card">
      <div class="report-card-hdr">
        <span class="report-card-date">📋 ${dt}</span>
        <span class="report-type-badge">${rtype}</span>
      </div>
      <div class="report-card-meta">
        <div class="meta-chip"><span>${r.supervisor||'—'}</span></div>
        <div class="meta-chip"><span>${r.period||'—'}</span></div>
      </div>
      <div class="report-card-actions">
        <button class="act-btn act-view" onclick="viewReport('${r.id}')">👁 عرض</button>
        ${canDelete?`<button class="act-btn act-edit" onclick="promptEdit('${r.id}','${escAttr(r.supervisor||'')}')">✏️ تعديل</button>`:''}
        ${canDelete?`<button class="act-btn act-del" onclick="promptDelete('${r.id}','${escAttr(r.supervisor||'')}')">🗑 حذف</button>`:''}
      </div>
    </div>`;
}
function escAttr(s){ return s.replace(/'/g,"\\'"); }

// ── Filter ────────────────────────────────────────────────────────────────────
function applyFilter(){
  const {from, to, supervisor, rtype} = getCurrentFilters();
  loadReports(from||null, to||null, supervisor||null, rtype||null);
}
function clearFilter(){
  ['fFrom','fTo','fType'].forEach(id=>{ document.getElementById(id).value=''; });
  if(isAdmin||isManager) document.getElementById('fSupervisor').value='';
  loadReports();
}

// ── View report ───────────────────────────────────────────────────────────────
async function viewReport(id){
  document.getElementById('modalBody').innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
  document.getElementById('viewModal').classList.add('show');
  try{
    const [rArr, entries] = await Promise.all([
      sbGet(`daily_reports?id=eq.${id}&select=*`),
      sbGet(`report_entries?report_id=eq.${id}&select=*&order=sort_order`)
    ]);
    const r = rArr[0];
    if(!r){ document.getElementById('modalBody').innerHTML='<div class="empty-state">تعذر تحميل التقرير</div>'; return; }
    const d  = new Date(r.report_date);
    const dt = d.toLocaleDateString('en-GB')+' '+d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('modalTitle').textContent = `📋 ${r.location} — ${r.period} — ${dt}`;

    const grouped = {};
    entries.forEach(e=>{ (grouped[e.section]=grouped[e.section]||[]).push(e); });

    let sectionsHtml = '';
    Object.keys(grouped).forEach(secKey=>{
      const items = grouped[secKey];
      const label = SECTION_LABELS[secKey]||secKey;
      const icon  = SECTION_ICONS[secKey]||'📌';
      let thead='', rows='';
      if(secKey==='closed_centers'){
        thead='<th>#</th><th>المركز</th><th>الحالة</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>مغلق</td></tr>`).join('');
      } else if(secKey==='departments'){
        thead='<th>#</th><th>الإدارة</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.has_notes?'نعم':'لا'}</td></tr>`).join('');
      } else if(secKey==='reception'||secKey==='departure'){
        thead='<th>#</th><th>المركز</th><th>عدد الحجاج</th><th>الجنسية</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.pilgrim_count??'—'}</td><td>${e.nationality||'—'}</td><td>${e.has_notes?'نعم':'لا'}</td></tr>`).join('');
      } else if(secKey==='presence'){
        thead='<th>#</th><th>المركز / الإدارة</th><th>متواجدون</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.has_notes?'نعم':'لا'}</td><td>${e.has_madar_report?(e.notes||'نعم'):'لا'}</td></tr>`).join('');
      } else {
        thead='<th>#</th><th>المركز</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.has_notes?(e.notes||'نعم'):'لا'}</td></tr>`).join('');
      }
      sectionsHtml += `<div class="msec">
        <div class="msec-title">${icon} ${label} (${items.length})</div>
        <table class="msec-table"><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table>
      </div>`;
    });

    document.getElementById('modalBody').innerHTML = `
      <div class="modal-meta">
        <div class="modal-meta-item"><span class="modal-meta-lbl">الموقع:</span><span class="modal-meta-val">${r.location||'—'}</span></div>
        <div class="modal-meta-item"><span class="modal-meta-lbl">المشرف:</span><span class="modal-meta-val">${r.supervisor||'—'}</span></div>
        <div class="modal-meta-item"><span class="modal-meta-lbl">الفترة:</span><span class="modal-meta-val">${r.period||'—'}</span></div>
        <div class="modal-meta-item"><span class="modal-meta-lbl">التاريخ:</span><span class="modal-meta-val">${dt}</span></div>
      </div>
      ${sectionsHtml||'<div class="empty-state" style="padding:20px 0">لا توجد بيانات</div>'}`;
    _currentReport = {r, entries, dt};
  }catch(e){
    document.getElementById('modalBody').innerHTML = '<div class="empty-state">خطأ في التحميل</div>';
  }
}

}

// ── Delete — password confirm ─────────────────────────────────────────────────
function promptDelete(id, supervisor){
  _pendingDeleteId  = id;
  _pendingDeleteSup = supervisor;
  if(isAdmin){
    // Admin يحذف مباشرة بدون كلمة مرور
    if(!confirm('هل أنت متأكد من حذف هذا التقرير؟')) return;
    execDelete(id);
    return;
  }
  document.getElementById('delSupName').textContent = supervisor;
  document.getElementById('delPwInput').value = '';
  document.getElementById('delErr').textContent = '';
  document.getElementById('deleteModal').classList.add('show');
  setTimeout(()=>document.getElementById('delPwInput').focus(), 200);
}

async function confirmDelete(){
  const pw = document.getElementById('delPwInput').value.trim();
  if(!pw){ document.getElementById('delErr').textContent = 'أدخل كلمة المرور'; return; }
  document.getElementById('delErr').textContent = '⏳ جاري التحقق...';
  try{
    const list = await sbGet(`accounts?name=eq.${encodeURIComponent(_pendingDeleteSup)}&password=eq.${encodeURIComponent(pw)}&select=id`);
    if(list && list.length > 0){
      closeDeleteModal();
      await execDelete(_pendingDeleteId);
    } else {
      document.getElementById('delErr').textContent = '✕ كلمة المرور غير صحيحة';
    }
  }catch{ document.getElementById('delErr').textContent = 'خطأ في التحقق'; }
}

async function execDelete(id){
  try{
    await sbDel(`report_entries?report_id=eq.${id}`);
    await sbDel(`daily_reports?id=eq.${id}`);
    _allReports = _allReports.filter(r=>r.id!==id);

    renderList(_allReports);
    toast('✓ تم حذف التقرير','success');
  }catch{ toast('خطأ في الحذف','error'); }
}

function closeDeleteModal(e){
  if(!e || e.target===document.getElementById('deleteModal')){
    document.getElementById('deleteModal').classList.remove('show');
    _pendingDeleteId = _pendingDeleteSup = null;
  }
}

  document.getElementById('editPwErr').textContent = '';

}

async function confirmEditPassword(){

  document.getElementById('editPwErr').textContent = '⏳ جاري التحقق...';

function closeEditPwModal(e){

async function openEditForm(id){
  document.getElementById('editFormBody').innerHTML = '<div class="loading">⏳ جاري التحميل...</div>';
  document.getElementById('editFormModal').classList.add('show');
  try{
    const [rArr, entries] = await Promise.all([
      sbGet(`daily_reports?id=eq.${id}&select=*`),
      sbGet(`report_entries?report_id=eq.${id}&select=*&order=sort_order`)
    ]);
    _editReport  = rArr[0];
    _editEntries = entries;
    if(!_editReport){ document.getElementById('editFormBody').innerHTML='<div class="empty-state">تعذر تحميل التقرير</div>'; return; }

    const d = new Date(_editReport.report_date);
    const pad = n => String(n).padStart(2,'0');
    const localIso = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;

    const grouped = {};
    entries.forEach(e=>{ (grouped[e.section]=grouped[e.section]||[]).push(e); });

    let sectionsHtml = '';
    Object.keys(grouped).forEach(secKey=>{
      const items  = grouped[secKey];
      const label  = SECTION_LABELS[secKey]||secKey;
      const icon   = SECTION_ICONS[secKey]||'📌';
      let rowsHtml = '';
      items.forEach(e=>{ rowsHtml += renderEditEntry(e, secKey); });
      sectionsHtml += `<div class="edit-section-block">
        <div class="edit-section-title">${icon} ${label}</div>
        ${rowsHtml}
      </div>`;
    });

    document.getElementById('editFormBody').innerHTML = `
      <div class="edit-field-group">
        <label class="edit-field-lbl">وقت التقرير</label>
        <input type="datetime-local" id="editDateTime" class="edit-input" value="${localIso}" style="max-width:260px">
      </div>
      <div class="edit-note">المشرف والفترة لا يمكن تعديلهما</div>
      <hr style="border-color:var(--card-border);margin:8px 0 14px">
      ${sectionsHtml||'<div class="empty-state" style="padding:20px 0">لا توجد أقسام</div>'}`;
  }catch{
    document.getElementById('editFormBody').innerHTML = '<div class="empty-state">خطأ في التحميل</div>';
  }
}

function renderEditEntry(e, secKey){
  let fields = '';
  if(secKey==='reception'||secKey==='departure'){
    fields = `
      <div class="edit-entry-field">
        <label class="edit-field-lbl">عدد الحجاج</label>
        <input type="number" class="edit-input" data-id="${e.id}" data-field="pilgrim_count" value="${e.pilgrim_count??''}" style="max-width:140px">
      </div>
      <div class="edit-entry-field">
        <label class="edit-field-lbl">ملاحظات</label>
        <textarea class="edit-input edit-textarea" data-id="${e.id}" data-field="notes" rows="2">${e.notes||''}</textarea>
      </div>`;
  } else if(secKey==='presence'){
    fields = `
      <div class="edit-entry-field">
        <label class="edit-field-lbl">متواجدون</label>
        <select class="edit-input" data-id="${e.id}" data-field="has_notes" style="max-width:120px">
          <option value="true" ${e.has_notes?'selected':''}>نعم</option>
          <option value="false" ${!e.has_notes?'selected':''}>لا</option>
        </select>
      </div>
      <div class="edit-entry-field">
        <label class="edit-field-lbl">ملاحظة</label>
        <textarea class="edit-input edit-textarea" data-id="${e.id}" data-field="notes" rows="2">${e.notes||''}</textarea>
      </div>`;
  } else if(secKey==='closed_centers'){
    fields = `<div class="edit-field-lbl" style="font-style:italic">مغلق (لا يمكن تعديله)</div>`;
  } else {
    fields = `
      <div class="edit-entry-field">
        <label class="edit-field-lbl">ملاحظات</label>
        <textarea class="edit-input edit-textarea" data-id="${e.id}" data-field="notes" rows="2">${e.notes||''}</textarea>
      </div>`;
  }
  return `<div class="edit-entry-row">
    <div class="edit-entry-center">${e.center||'—'}</div>
    ${fields}
  </div>`;
}

function closeEditFormModal(e){
  if(!e || e.target===document.getElementById('editFormModal')){
    document.getElementById('editFormModal').classList.remove('show');
    _editReport = null;
    _editEntries = [];
  }
}

async function saveEdit(){
  if(!_editReport) return;
  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.textContent = '⏳ جاري الحفظ...';
  try{
    // 1. تحديث وقت التقرير
    const dtVal = document.getElementById('editDateTime').value;
    if(dtVal){
      await sbPatch(`daily_reports?id=eq.${_editReport.id}`, {report_date: new Date(dtVal).toISOString()});
    }

    // 2. تحديث كل entry
    const inputs = document.querySelectorAll('#editFormBody [data-id]');
    const updates = {};
    inputs.forEach(el=>{
      const id    = el.dataset.id;
      const field = el.dataset.field;
      if(!updates[id]) updates[id] = {};
      if(field==='has_notes')       updates[id][field] = el.value==='true';
      else if(field==='pilgrim_count') updates[id][field] = el.value!=='' ? parseInt(el.value) : null;
      else                           updates[id][field] = el.value||null;
    });
    await Promise.all(Object.entries(updates).map(([id, body])=>sbPatch(`report_entries?id=eq.${id}`, body)));

    closeEditFormModal();
    const {from,to,supervisor,rtype}=getCurrentFilters();
    await loadReports(from||null,to||null,supervisor||null,rtype||null);
    toast('✓ تم حفظ التعديلات','success');
  }catch{
    toast('خطأ في الحفظ','error');
  }finally{
    btn.disabled=false;
    btn.textContent='حفظ التعديلات';
  }
}

// ── Export current filtered list ──────────────────────────────────────────────
async function doExportDay(){

  const exportBtn = document.getElementById('exportCurrentBtn');
  const oldLabel = exportBtn.textContent;
  exportBtn.disabled = true;
  exportBtn.textContent = '⏳ جاري التصدير...';

    filtered = await fetchReports(from||null, to||null, supervisor||null, rtype||null);

    renderList(_allReports);

    toast('خطأ في تجهيز التصدير','error');
    exportBtn.disabled = false;
    exportBtn.textContent = oldLabel;

    toast('لا توجد تقارير حسب الفلاتر الحالية','error');

    exportBtn.textContent = oldLabel;
    return;

  try{
  // sortReports starts with location, then period, then latest report time.
  const sorted = sortReports(filtered);
  const entriesArr = await Promise.all(
    sorted.map(r=>sbGet(`report_entries?report_id=eq.${r.id}&select=*&order=sort_order`))
  );

  // ── Build focused daily export rows ───────────────────────────────────────
  const COLS = ['التاريخ','الموقع','الفترة','القسم','المركز / الإدارة','عدد الحجاج','ملاحظات'];
  const dataRows = [];
  sorted.forEach((r,ri)=>{
    const entries = entriesArr[ri]||[];
    const d = new Date(r.report_date);
    const dateStr = d.toLocaleDateString('en-GB');
    entries.forEach(e=>{
      const secLabel = SECTION_LABELS[e.section]||e.section;
      const isPilgrim  = e.section==='reception'||e.section==='departure';
      const isPresence = e.section==='presence';
      const row = [
        dateStr,
        r.location||'',
        r.period||'',
        secLabel,
        e.center||'',
        isPilgrim  ? (e.pilgrim_count??'') : '',
        isPresence
          ? `${e.has_notes ? 'متواجدون: نعم' : 'متواجدون: لا'}${e.has_madar_report ? ` — ${e.notes||'يوجد ملاحظات'}` : ''}`
          : (e.has_notes?(e.notes||'نعم'):'لا'),
      ];
      row._date = r.report_date;
      dataRows.push(row);
    });
    if(!entries.length){
      const row = [dateStr,r.location||'',r.period||'','—','—','',''];
      row._date = r.report_date;
      dataRows.push(row);
    }
  });
  // ترتيب: التاريخ (يوم فقط) ← الموقع (مكة←المشاعر←المدينة) ← الفترة ← القسم ← المركز/الإدارة
  function dateStrToISO(s){ const p=s.split('/'); return p.length===3?`${p[2]}-${p[1]}-${p[0]}`:s; }
  dataRows.sort((a,b)=>{
    const dateCmp = dateStrToISO(a[0]).localeCompare(dateStrToISO(b[0]));
    if(dateCmp!==0) return dateCmp;
    const lCmp = locationRank(a[1]) - locationRank(b[1]);
    if(lCmp!==0) return lCmp;
    const pCmp = periodRank(a[2]) - periodRank(b[2]);
    if(pCmp!==0) return pCmp;
    const sCmp = String(a[3]).localeCompare(String(b[3]),'ar');
    if(sCmp!==0) return sCmp;
    return String(a[4]).localeCompare(String(b[4]),'ar');
  });

  if(typeof ExcelJS === 'undefined'){
    toast('تعذر تحميل مكتبة Excel، حاول مرة أخرى','error');
    exportBtn.disabled = false;
    exportBtn.textContent = oldLabel;
    return;
  }

  // ── Build workbook with logo, brand title, header and plain data ──────────
  const reportTypeLabel = rtype === 'presence'
    ? 'تقرير التواجد'
    : rtype === 'daily'
      ? 'التقرير اليومي'
      : 'التقرير اليومي والتواجد';
  const scopeLabel = buildExportScopeLabel(from, to);
  const title = `إدارة الامتثال والالتزام — ${reportTypeLabel} ${scopeLabel}`;
  const workbook = new ExcelJS.Workbook();
  workbook.creator = 'Al Rajhi Hajj';
  workbook.created = new Date();
  workbook.views = [{rightToLeft:true}];

  const ws = workbook.addWorksheet('التقرير اليومي', {
    views:[{rightToLeft:true,state:'frozen',ySplit:3}],
    properties:{defaultRowHeight:24}
  });

  ws.columns = [
    {width:14},
    {width:18},
    {width:16},
    {width:24},
    {width:42},
    {width:14},
    {width:46}
  ];

  ws.addRow(['', title, '', '', '', '', '']);
  ws.addRow(['', '', '', '', '', '', '']);
  ws.addRow(COLS);
  dataRows.forEach(row=>ws.addRow(row));

  ws.mergeCells('B1:G1');
  ws.autoFilter = {from:'A3',to:'G3'};

  const argb = color => 'FF'+color;
  const borderGold = {style:'thin',color:{argb:argb('C9A84C')}};
  const borderDark = {style:'thin',color:{argb:argb('2E3D50')}};
  const titleFill = {type:'pattern',pattern:'solid',fgColor:{argb:argb('0C2550')}};
  const spacerFill = {type:'pattern',pattern:'solid',fgColor:{argb:argb('0F1923')}};
  const headerFill = {type:'pattern',pattern:'solid',fgColor:{argb:argb('C9A84C')}};
  const titleBorder = {top:borderGold,bottom:{style:'medium',color:{argb:argb('C9A84C')}},left:borderGold,right:borderGold};
  const dataBorder = {top:borderDark,bottom:borderDark,left:borderDark,right:borderDark};

  ws.getRow(1).height = 50;
  ws.getRow(2).height = 8;
  ws.getRow(3).height = 28;
  ws.getRow(1).eachCell({includeEmpty:true}, cell=>{
    cell.fill = titleFill;
    cell.border = titleBorder;
    cell.alignment = {horizontal:'center',vertical:'middle',wrapText:true};
  });
  ws.getCell('B1').font = {bold:true,size:16,color:{argb:argb('C9A84C')},name:'Arial'};
  ws.getRow(2).eachCell({includeEmpty:true}, cell=>{
    cell.fill = spacerFill;
    cell.border = {bottom:borderDark};
  });
  ws.getRow(3).eachCell({includeEmpty:true}, cell=>{
    cell.font = {bold:true,size:12,color:{argb:argb('0C2550')},name:'Arial'};
    cell.fill = headerFill;
    cell.alignment = {horizontal:'center',vertical:'middle',wrapText:true};
    cell.border = {top:borderGold,bottom:borderGold,left:borderGold,right:borderGold};
  });

  for(let r=4; r<=ws.rowCount; r++){
    const row = ws.getRow(r);
    row.height = 24;
    row.eachCell({includeEmpty:true}, cell=>{
      const empty = cell.value === null || cell.value === undefined || cell.value === '';
      cell.font = {size:11,color:{argb:argb(empty?'5B6575':'1B2535')},name:'Arial'};
      cell.alignment = {horizontal:empty?'center':'right',vertical:'middle',wrapText:true};
      cell.border = dataBorder;
    });
  }

  try{
    const logoBase64 = await imageToBase64('/Alrajhi.png');
    const logoId = workbook.addImage({base64:logoBase64,extension:'png'});
    ws.addImage(logoId,{tl:{col:0.18,row:0.12},ext:{width:86,height:44},editAs:'oneCell'});
  }catch(e){
    console.warn('Logo could not be added to Excel export:', e);
  }

  const buffer = await workbook.xlsx.writeBuffer();
  saveBlob(buffer, `تقارير_السجل_${buildExportFileSuffix(from, to)}.xlsx`);
  }catch(e){
    console.error('Excel export failed:', e);
    toast('خطأ في التصدير','error');
  }finally{
    exportBtn.disabled = false;
    exportBtn.textContent = oldLabel;
  }
}

function buildExportScopeLabel(from, to){
  if(from && to && from === to) return `تاريخ  ${from}`;
  if(from && to) return `للفترة ${from} إلى ${to}`;
  if(from) return `من تاريخ  ${from}`;
  if(to) return `حتى تاريخ  ${to}`;
  return 'حسب الفلاتر الحالية';
}

function buildExportFileSuffix(from, to){
  if(from && to && from === to) return from;
  if(from && to) return `${from}_to_${to}`;
  if(from) return `from_${from}`;
  if(to) return `to_${to}`;
  return new Date().toISOString().substring(0,10);
}

async function imageToBase64(url){
  const res = await fetch(url);
  if(!res.ok) throw new Error('logo fetch failed');
  const blob = await res.blob();
  return await new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function saveBlob(buffer, filename){
  const blob = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function buildDayPrint(reports, entriesByReport, date){
  const ZONE_ICONS = {'مكة المكرمة':'🕋','المدينة المنورة':'🕌','عرفة':'⛺','منى':'🏕️','مزدلفة':'🌙'};
  let html = `<div class="pdoc">
    <div class="phdr">
      <div><div class="plogo">الراجحي</div><div class="plogo-en">Al Rajhi</div></div>
      <div style="text-align:center;flex:1;padding:0 16px">
        <div class="ptitle-main">إدارة الامتثال والالتزام</div>
        <div class="ptitle-sub">تقارير يوم ${date}</div>
      </div>
      <div style="font-size:8pt;color:#555">${new Date().toLocaleDateString('en-GB')}</div>
    </div>`;

  let lastLoc = null;
  reports.forEach(r=>{
    const entries = entriesByReport[r.id]||[];
    if(lastLoc && lastLoc!==r.location) html += `<div class="ploc-divider"></div>`;
    lastLoc = r.location;
    const icon = ZONE_ICONS[r.location]||'📍';
    const t = new Date(r.report_date).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    html += `<div class="preport-block">
      <div class="preport-hdr">
        <span>${icon} ${r.location} — ${r.period} — ${r.supervisor}</span>
        <span>${t}</span>
      </div>`;

    const grouped={};
    entries.forEach(e=>{ (grouped[e.section]=grouped[e.section]||[]).push(e); });
    if(!Object.keys(grouped).length) html += `<p style="font-size:8pt;color:#666;padding:4px">لا توجد بيانات</p>`;

    Object.keys(grouped).forEach(secKey=>{
      const items = grouped[secKey];
      const label = SECTION_LABELS[secKey]||secKey;
      let thead='', rows='';
      if(secKey==='closed_centers'){
        thead='<th>#</th><th>المركز</th><th>الحالة</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>مغلق</td></tr>`).join('');
      } else if(secKey==='departments'){
        thead='<th>#</th><th>الإدارة</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.has_notes?'نعم':'لا'}</td></tr>`).join('');
      } else if(secKey==='reception'||secKey==='departure'){
        thead='<th>#</th><th>المركز</th><th>عدد الحجاج</th><th>الجنسية</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.pilgrim_count??'—'}</td><td>${e.nationality||'—'}</td><td>${e.has_notes?'نعم':'لا'}</td></tr>`).join('');
      } else if(secKey==='presence'){
        thead='<th>#</th><th>المركز / الإدارة</th><th>متواجدون</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.has_notes?'نعم':'لا'}</td><td>${e.has_madar_report?(e.notes||'نعم'):'لا'}</td></tr>`).join('');
      } else {
        thead='<th>#</th><th>المركز</th><th>ملاحظات</th>';
        rows=items.map((e,i)=>`<tr><td>${i+1}</td><td>${e.center||'—'}</td><td>${e.has_notes?(e.notes||'نعم'):'لا'}</td></tr>`).join('');
      }
      html += `<div class="psec"><div class="psec-title">${label} (${items.length})</div>
        <table class="ptable"><thead><tr>${thead}</tr></thead><tbody>${rows}</tbody></table></div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

// ── Individual report print ───────────────────────────────────────────────────
async function exportReport(id){
  const [rArr, entries] = await Promise.all([
    sbGet(`daily_reports?id=eq.${id}&select=*`),
    sbGet(`report_entries?report_id=eq.${id}&select=*&order=sort_order`)
  ]);
  printReportDoc(rArr[0], entries);
}
function printCurrentReport(){
  if(!_currentReport) return;
  printReportDoc(_currentReport.r, _currentReport.entries);
}
function printReportDoc(r, entries){
  const d  = new Date(r.report_date);
  const dt = d.toLocaleDateString('en-GB');
  const map = {};
  entries.forEach(e=>{ (map[e.section]=map[e.section]||[]).push(e); });
  const body = buildDayPrint([r], {[r.id]:entries}, dt);
  document.getElementById('printView').innerHTML = body;
  document.querySelector('.no-print').style.display='none';
  document.getElementById('printView').style.display='block';
  window.print();
  document.querySelector('.no-print').style.display='';
  document.getElementById('printView').style.display='none';
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt;
function toast(msg,type='success'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className=`toast show ${type}`;
  clearTimeout(_tt); _tt=setTimeout(()=>el.className='toast',3500);
}

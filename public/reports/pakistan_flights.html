<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>وصول رحلات باكستان إلى مكة المكرمة</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#e8e0d0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh}
.page-header{background:linear-gradient(135deg,#0d1f3c 0%,#1a3a6b 60%,#0d1f3c 100%);border-bottom:3px solid #c9a84c;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.header-logo{width:52px;height:52px;border-radius:8px;background:#c9a84c;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#0d1f3c;flex-shrink:0}
.header-text h1{font-size:1.35rem;color:#c9a84c;font-weight:700}
.header-text p{font-size:0.78rem;color:#8a9fc0;margin-top:2px}
.header-badge{margin-right:auto;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:8px 16px;text-align:center}
.header-badge .badge-val{font-size:1.4rem;font-weight:700;color:#c9a84c}
.header-badge .badge-lbl{font-size:0.7rem;color:#8a9fc0}
.kpi-strip{display:flex;gap:12px;padding:16px 24px;background:rgba(13,31,60,.6);border-bottom:1px solid rgba(201,168,76,.15);flex-wrap:wrap}
.kpi{flex:1;min-width:140px;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:12px 16px;text-align:center}
.kpi-val{font-size:1.5rem;font-weight:700;color:#c9a84c}
.kpi-lbl{font-size:0.72rem;color:#8a9fc0;margin-top:3px}
.legend{display:flex;gap:8px;align-items:center;padding:12px 24px;flex-wrap:wrap}
.legend-title{font-size:0.7rem;color:#5a7090;margin-left:4px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.65rem;color:#8a9fc0}
.legend-swatch{width:14px;height:14px;border-radius:3px}
.cal-wrap{padding:20px 24px}
.month-block{margin-bottom:28px}
.month-title{font-size:1rem;color:#c9a84c;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,.2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-name{text-align:center;font-size:0.68rem;color:#5a7090;padding:4px 0;font-weight:600}
.cal-cell{border-radius:8px;padding:8px 6px;border:1px solid transparent;min-height:72px;display:flex;flex-direction:column;gap:3px;transition:transform .12s,box-shadow .12s}
.cal-cell.empty{background:transparent;border:none}
.cal-cell.no-data{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
.cal-cell.no-data .cell-day{color:#3a5070}
.cal-cell.has-data{cursor:pointer}
.cal-cell.has-data:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:2}
.heat-1{background:rgba(201,168,76,.10);border-color:rgba(201,168,76,.25)}
.heat-2{background:rgba(201,168,76,.22);border-color:rgba(201,168,76,.4)}
.heat-3{background:rgba(201,168,76,.38);border-color:rgba(201,168,76,.6)}
.heat-4{background:rgba(255,140,0,.45);border-color:rgba(255,140,0,.7)}
.heat-5{background:rgba(220,60,40,.55);border-color:rgba(220,60,40,.8)}
.cell-day{font-size:0.85rem;font-weight:700;color:#c9a84c;line-height:1}
.cell-hijri{font-size:0.6rem;color:#7a9ab8;line-height:1}
.cell-pilgrims{font-size:0.72rem;font-weight:600;color:#e8e0d0;margin-top:auto}
.cell-rec{font-size:0.6rem;color:#8a9fc0}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#0d1f3c;border:2px solid #c9a84c;border-radius:14px;width:100%;max-width:740px;max-height:90vh;overflow-y:auto;animation:si .2s ease}
@keyframes si{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{background:linear-gradient(135deg,#0d1f3c,#1a3a6b);padding:18px 20px;border-bottom:2px solid #c9a84c;position:sticky;top:0;z-index:1}
.modal-head h2{font-size:1.1rem;color:#c9a84c}
.modal-head p{font-size:0.78rem;color:#8a9fc0;margin-top:3px}
.modal-close{position:absolute;top:14px;left:16px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:4px 10px;cursor:pointer;color:#c9a84c;font-size:0.9rem}
.modal-kpis{display:flex;gap:10px;padding:14px 20px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.07);flex-wrap:wrap}
.m-kpi{flex:1;min-width:90px;text-align:center}
.m-kpi-val{font-size:1.1rem;font-weight:700;color:#c9a84c}
.m-kpi-lbl{font-size:0.65rem;color:#8a9fc0}
.grp-list{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.grp-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden}
.grp-card.open .grp-arrow{transform:rotate(180deg)}
.grp-header{padding:10px 12px;cursor:pointer;transition:background .15s}
.grp-header:hover{background:rgba(201,168,76,.08)}
.grp-top{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.grp-code{font-size:0.88rem;font-weight:700;color:#c9a84c;font-family:monospace}
.grp-flight{font-size:0.72rem;background:rgba(88,166,255,.12);border:1px solid rgba(88,166,255,.3);border-radius:4px;padding:1px 7px;color:#7ab8ff}
.grp-from{font-size:0.7rem;color:#8a9fc0}
.grp-arrow{font-size:0.7rem;color:#8a9fc0;margin-right:auto;transition:transform .15s}
.grp-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.chip{font-size:0.68rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:2px 8px;color:#aaa}
.grp-body{display:none;padding:10px 12px;border-top:1px solid rgba(255,255,255,.07)}
.grp-card.open .grp-body{display:block}
.drow{display:flex;gap:8px;margin-bottom:5px;font-size:0.78rem}
.dlbl{color:#8a9fc0;flex-shrink:0;width:100px}
.dval{color:#e8e0d0}
.map-btn{display:inline-flex;align-items:center;gap:5px;margin-top:8px;background:rgba(52,168,83,.12);border:1px solid rgba(52,168,83,.35);border-radius:6px;padding:5px 12px;color:#5cb85c;font-size:0.78rem;text-decoration:none;transition:background .15s}
.map-btn:hover{background:rgba(52,168,83,.25)}
@media(max-width:580px){.cal-cell{min-height:58px;padding:5px 3px}.cell-day{font-size:0.75rem}.kpi-strip{gap:8px}}
</style>
</head>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">

const HIJRI_DAY = {"2026-04-26":"2 ذو القعدة 1447","2026-04-27":"3 ذو القعدة 1447","2026-04-28":"4 ذو القعدة 1447","2026-04-29":"5 ذو القعدة 1447","2026-04-30":"6 ذو القعدة 1447","2026-05-01":"7 ذو القعدة 1447","2026-05-02":"8 ذو القعدة 1447","2026-05-03":"9 ذو القعدة 1447","2026-05-04":"10 ذو القعدة 1447","2026-05-05":"11 ذو القعدة 1447","2026-05-06":"12 ذو القعدة 1447","2026-05-07":"13 ذو القعدة 1447","2026-05-08":"14 ذو القعدة 1447","2026-05-09":"15 ذو القعدة 1447","2026-05-10":"16 ذو القعدة 1447","2026-05-11":"17 ذو القعدة 1447","2026-05-14":"20 ذو القعدة 1447","2026-05-15":"21 ذو القعدة 1447","2026-05-17":"23 ذو القعدة 1447","2026-05-18":"24 ذو القعدة 1447","2026-05-19":"25 ذو القعدة 1447","2026-05-20":"26 ذو القعدة 1447","2026-05-21":"27 ذو القعدة 1447"};
const META={total:95347,peak_iso:"2026-05-11",peak_count:15154,active_days:23,avg_daily:4146};
function fmt(n){return Number(n).toLocaleString('en-US');}
document.getElementById('hdr-total').textContent=fmt(META.total);
document.getElementById('kpi-total').textContent=fmt(META.total);
document.getElementById('kpi-peak-count').textContent=fmt(META.peak_count);
document.getElementById('kpi-days').textContent=META.active_days;
document.getElementById('kpi-avg').textContent=fmt(META.avg_daily);
(function(){
  const d=new Date(META.peak_iso+'T00:00:00');
  const g=d.toLocaleDateString('ar-SA-u-ca-gregory',{day:'numeric',month:'long'});
  const h=HIJRI_DAY[META.peak_iso]||'';
  document.getElementById('kpi-peak-date').textContent=g+(h?' / '+h.split(' ').slice(0,2).join(' '):'');
})();
// Hijri 1447: 1 Dhul Qa'dah = Apr 18, 1 Dhul Hijjah = May 18
const H_DQ=new Date('2026-04-18T00:00:00'),H_DH=new Date('2026-05-18T00:00:00');
const MH_PAK=['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];
function toHijriPak(iso){const d=new Date(iso+'T00:00:00'),ms=86400000;
  if(d>=H_DH)return(Math.floor((d-H_DH)/ms)+1)+' '+MH_PAK[11]+' 1447';
  return(Math.floor((d-H_DQ)/ms)+1)+' '+MH_PAK[10]+' 1447';}
Object.keys(DAY_DATA).forEach(iso=>{HIJRI_DAY[iso]=toHijriPak(iso);});
const maxCount=Math.max(...Object.values(DAY_DATA).map(v=>v.pilgrims));
function heatClass(n){
  if(!n)return'';const r=n/maxCount;
  if(r<0.2)return'heat-1';if(r<0.4)return'heat-2';
  if(r<0.65)return'heat-3';if(r<0.85)return'heat-4';return'heat-5';
}
const DN=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MN=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
function buildCalendar(){
  const wrap=document.getElementById('cal-wrap');
  const isos=Object.keys(DAY_DATA).sort();
  const first=new Date(isos[0]+'T00:00:00'),last=new Date(isos[isos.length-1]+'T00:00:00');
  let ym={year:first.getFullYear(),month:first.getMonth()};
  const yme={year:last.getFullYear(),month:last.getMonth()};
  while(true){wrap.appendChild(buildMonth(ym.year,ym.month));
    if(ym.year===yme.year&&ym.month===yme.month)break;
    ym.month++;if(ym.month>11){ym.month=0;ym.year++;}}
}
function buildMonth(yr,mo){
  const bl=document.createElement('div');bl.className='month-block';
  const ti=document.createElement('div');ti.className='month-title';
  ti.textContent=MN[mo]+' '+yr;bl.appendChild(ti);
  const gr=document.createElement('div');gr.className='cal-grid';
  DN.forEach(n=>{const d=document.createElement('div');d.className='day-name';d.textContent=n;gr.appendChild(d);});
  const fw=new Date(yr,mo,1).getDay();
  for(let i=0;i<fw;i++){const e=document.createElement('div');e.className='cal-cell empty';gr.appendChild(e);}
  const dim=new Date(yr,mo+1,0).getDate();
  for(let day=1;day<=dim;day++){
    const iso=`${yr}-${String(mo+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const info=DAY_DATA[iso];
    const cell=document.createElement('div');
    const hj=HIJRI_DAY[iso]||'';
    cell.className=info?'cal-cell has-data '+heatClass(info.pilgrims):'cal-cell no-data';
    if(info)cell.onclick=()=>openModal(iso);
    cell.innerHTML=`<div class="cell-day">${day}</div>
      <div class="cell-hijri">${hj?hj.split(' ').slice(0,2).join(' '):''}</div>
      ${info?`<div class="cell-pilgrims">${fmt(info.pilgrims)} حاج</div>
      <div class="cell-rec">${info.groups.length} سجل</div>`:''}`;
    gr.appendChild(cell);
  }
  bl.appendChild(gr);return bl;
}
function openModal(iso){
  const info=DAY_DATA[iso];if(!info)return;
  const d=new Date(iso+'T00:00:00');
  document.getElementById('m-title').textContent=d.toLocaleDateString('ar-SA-u-ca-gregory',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const hj=HIJRI_DAY[iso]||'';
  document.getElementById('m-sub').textContent=hj?'الموافق '+hj+' هـ':'';
  document.getElementById('mk-pilgrims').textContent=fmt(info.pilgrims);
  document.getElementById('mk-groups').textContent=info.groups.length;
  document.getElementById('mk-flights').textContent=new Set(info.groups.map(g=>g.flight)).size;
  document.getElementById('mk-teams').textContent=new Set(info.groups.map(g=>g.team)).size;
  document.getElementById('grp-list').innerHTML=info.groups.map(g=>`
    <div class="grp-card" onclick="toggleCard(this)">
      <div class="grp-header">
        <div class="grp-top">
          <span class="grp-code">${g.group_code}</span>
          <span class="grp-from">من: ${g.from_city}</span>
          <span class="grp-arrow">▼</span>
        </div>
        <div class="grp-meta">
          <span class="chip">عمارة ${g.building}</span>
          <span class="chip">فريق ${g.team}</span>
          <span class="chip">${fmt(g.pilgrims)} حاج</span>
          ${g.district?`<span class="chip">📍 ${g.district}</span>`:''}
        </div>
      </div>
      <div class="grp-body">
        <div class="drow"><span class="dlbl">رمز المجموعة:</span><span class="dval">${g.group_code}</span></div>
        <div class="drow"><span class="dlbl">رقم الرحلة:</span><span class="dval">${g.flight}</span></div>
        <div class="drow"><span class="dlbl">من:</span><span class="dval">${g.from_city}</span></div>
        <div class="drow"><span class="dlbl">رقم العمارة:</span><span class="dval">${g.building}</span></div>
        <div class="drow"><span class="dlbl">فريق الضيافة:</span><span class="dval">${g.team}</span></div>
        <div class="drow"><span class="dlbl">عدد الحجاج:</span><span class="dval">${fmt(g.pilgrims)}</span></div>
        <div class="drow"><span class="dlbl">الحي:</span><span class="dval">${g.district||'—'}</span></div>
        ${g.url?`<a class="map-btn" href="${g.url}" target="_blank" rel="noopener">📍 فتح الموقع على الخريطة</a>`:''}
      </div>
    </div>`).join('');
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function toggleCard(el){el.classList.toggle('open');}
buildCalendar();
</script>

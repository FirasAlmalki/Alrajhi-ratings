<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>الوصول المتوقع الى مكة المكرمة</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a1628;color:#e8e0d0;font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh}

/* ─ Header ─ */
.page-header{background:linear-gradient(135deg,#0d1f3c 0%,#1a3a6b 60%,#0d1f3c 100%);border-bottom:3px solid #c9a84c;padding:20px 24px;display:flex;align-items:center;gap:16px}
.header-logo{width:52px;height:52px;border-radius:8px;background:#c9a84c;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:900;color:#0d1f3c;flex-shrink:0}
.header-text h1{font-size:1.4rem;color:#c9a84c;font-weight:700}
.header-text p{font-size:0.8rem;color:#8a9fc0;margin-top:2px}
.header-badge{margin-right:auto;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:8px;padding:8px 16px;text-align:center}
.header-badge .badge-val{font-size:1.4rem;font-weight:700;color:#c9a84c}
.header-badge .badge-lbl{font-size:0.7rem;color:#8a9fc0}

/* ─ KPI strip ─ */
.kpi-strip{display:flex;gap:12px;padding:16px 24px;background:rgba(13,31,60,.6);border-bottom:1px solid rgba(201,168,76,.15);flex-wrap:wrap}
.kpi{flex:1;min-width:140px;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.15);border-radius:10px;padding:12px 16px;text-align:center}
.kpi-val{font-size:1.5rem;font-weight:700;color:#c9a84c}
.kpi-lbl{font-size:0.72rem;color:#8a9fc0;margin-top:3px}

/* ─ Calendar ─ */
.cal-wrap{padding:24px}
.month-block{margin-bottom:28px}
.month-title{font-size:1rem;color:#c9a84c;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,.2)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
.day-name{text-align:center;font-size:0.68rem;color:#5a7090;padding:4px 0;font-weight:600}
.cal-cell{border-radius:8px;padding:8px 6px;cursor:pointer;position:relative;transition:transform .12s,box-shadow .12s;border:1px solid transparent;min-height:70px;display:flex;flex-direction:column;gap:3px}
.cal-cell.empty{background:transparent;cursor:default;border:none}
.cal-cell.no-data{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.06)}
.cal-cell.no-data .cell-day{color:#3a5070}
.cal-cell.has-data{cursor:pointer}
.cal-cell.has-data:hover{transform:scale(1.04);box-shadow:0 4px 16px rgba(0,0,0,.4);z-index:2}

/* heat colours */
.heat-1{background:rgba(201,168,76,.10);border-color:rgba(201,168,76,.25)}
.heat-2{background:rgba(201,168,76,.22);border-color:rgba(201,168,76,.4)}
.heat-3{background:rgba(201,168,76,.38);border-color:rgba(201,168,76,.6)}
.heat-4{background:rgba(255,140,0,.45);border-color:rgba(255,140,0,.7)}
.heat-5{background:rgba(220,60,40,.55);border-color:rgba(220,60,40,.8)}

.cell-day{font-size:0.85rem;font-weight:700;color:#c9a84c;line-height:1}
.cell-hijri{font-size:0.6rem;color:#7a9ab8;line-height:1}
.cell-pilgrims{font-size:0.72rem;font-weight:600;color:#e8e0d0;margin-top:auto}
.cell-groups{font-size:0.6rem;color:#8a9fc0}

/* ─ Modal ─ */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:100;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:#0d1f3c;border:2px solid #c9a84c;border-radius:14px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateY(-20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{background:linear-gradient(135deg,#0d1f3c,#1a3a6b);padding:18px 20px;border-bottom:2px solid #c9a84c;position:sticky;top:0;z-index:1}
.modal-head h2{font-size:1.1rem;color:#c9a84c}
.modal-head p{font-size:0.78rem;color:#8a9fc0;margin-top:3px}
.modal-close{position:absolute;top:14px;left:16px;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);border-radius:6px;padding:4px 10px;cursor:pointer;color:#c9a84c;font-size:0.9rem}
.modal-kpis{display:flex;gap:10px;padding:14px 20px;background:rgba(0,0,0,.2);border-bottom:1px solid rgba(255,255,255,.07);flex-wrap:wrap}
.modal-kpi{flex:1;min-width:100px;text-align:center}
.modal-kpi-val{font-size:1.1rem;font-weight:700;color:#c9a84c}
.modal-kpi-lbl{font-size:0.65rem;color:#8a9fc0}
.grp-list{padding:14px 16px;display:flex;flex-direction:column;gap:8px}
.grp-card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:8px;overflow:hidden;cursor:pointer}
.grp-card:hover .grp-header{background:rgba(201,168,76,.08)}
.grp-header{padding:10px 12px;transition:background .15s}
.grp-header-top{display:flex;align-items:center;gap:6px}
.grp-num{font-size:0.85rem;font-weight:700;color:#c9a84c}
.grp-nat{font-size:0.67rem;background:rgba(255,255,255,.1);border-radius:4px;padding:1px 6px;color:#ccc;font-weight:500}
.grp-arrow{font-size:0.7rem;color:#8a9fc0;margin-right:auto;transition:transform .15s}
.grp-card.open .grp-arrow{transform:rotate(180deg)}
.grp-header-meta{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.grp-meta-chip{font-size:0.68rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:5px;padding:2px 8px;color:#aaa}
.grp-body{padding:10px 12px;border-top:1px solid rgba(255,255,255,.07);display:none}
.grp-card.open .grp-body{display:block}
.housing-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px;font-size:0.75rem}
.housing-lbl{color:#8a9fc0;flex-shrink:0;width:65px}
.housing-val{color:#e8e0d0}
.arrival-row{font-size:0.7rem;color:#7a9ab8;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.06)}

/* ─ Legend ─ */
.legend{display:flex;gap:8px;align-items:center;padding:0 24px 16px;flex-wrap:wrap}
.legend-title{font-size:0.7rem;color:#5a7090;margin-left:4px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:0.65rem;color:#8a9fc0}
.legend-swatch{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.1)}

@media(max-width:600px){
  .page-header{flex-wrap:wrap}
  .header-badge{margin-right:0;width:100%}
  .kpi-strip{gap:8px}
  .cal-grid{gap:3px}
  .cal-cell{min-height:58px;padding:6px 4px}
  .cell-day{font-size:0.78rem}
}
</style>
</head>

    <div class="modal-kpis">
      <div class="modal-kpi"><div class="modal-kpi-val" id="m-pilgrims">—</div><div class="modal-kpi-lbl">الحجاج المتوقعون</div></div>

    <div class="grp-list" id="grp-list"></div>
  </div>
</div>

// ── KPIs ──────────────────────────────────────────────────────────────────────

})();

// ── Heat scale ────────────────────────────────────────────────────────────────
const counts = Object.values(DAY_DATA).map(v=>v.pilgrims);
const maxCount = Math.max(...counts);
function heatClass(n){
  if(!n) return '';
  const r = n / maxCount;
  if(r < 0.2)  return 'heat-1';
  if(r < 0.4)  return 'heat-2';
  if(r < 0.65) return 'heat-3';
  if(r < 0.85) return 'heat-4';
  return 'heat-5';
}

// ── Calendar builder ──────────────────────────────────────────────────────────
const DAY_NAMES = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTH_NAMES_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

function buildCalendar(){
  const wrap = document.getElementById('cal-wrap');
  // Determine min/max months from data
  const isos = Object.keys(DAY_DATA).sort();
  const firstDate = new Date(isos[0] + 'T00:00:00');
  const lastDate  = new Date(isos[isos.length-1] + 'T00:00:00');

  let ym = { year: firstDate.getFullYear(), month: firstDate.getMonth() };
  const ymEnd = { year: lastDate.getFullYear(), month: lastDate.getMonth() };

  while(true){
    wrap.appendChild(buildMonth(ym.year, ym.month));
    if(ym.year === ymEnd.year && ym.month === ymEnd.month) break;
    ym.month++;
    if(ym.month > 11){ ym.month=0; ym.year++; }
  }
}

function buildMonth(year, month){
  const block = document.createElement('div');
  block.className = 'month-block';

  const title = document.createElement('div');
  title.className = 'month-title';
  title.textContent = MONTH_NAMES_AR[month] + ' ' + year;
  block.appendChild(title);

  const grid = document.createElement('div');
  grid.className = 'cal-grid';

  DAY_NAMES.forEach(n=>{
    const d = document.createElement('div');
    d.className='day-name'; d.textContent=n; grid.appendChild(d);
  });

  // First day of month weekday (0=Sun)
  const firstWd = new Date(year, month, 1).getDay();
  for(let i=0;i<firstWd;i++){
    const e=document.createElement('div'); e.className='cal-cell empty'; grid.appendChild(e);
  }

  const daysInMonth = new Date(year, month+1, 0).getDate();
  for(let day=1;day<=daysInMonth;day++){
    const iso = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const info = DAY_DATA[iso];
    const cell = document.createElement('div');
    const hj = HIJRI_DAY[iso] || '';

    if(info){
      cell.className = 'cal-cell has-data ' + heatClass(info.pilgrims);
      cell.onclick = ()=> openModal(iso);
    } else {
      cell.className = 'cal-cell no-data';
    }

    cell.innerHTML = `<div class="cell-day">${day}</div>
      <div class="cell-hijri">${hj ? hj.split(' ').slice(0,2).join(' ') : ''}</div>
      ${info ? `<div class="cell-pilgrims">${fmt(info.pilgrims)} حاج</div>
      <div class="cell-groups">${info.groups.length} مجموعة</div>` : ''}`;

    grid.appendChild(cell);
  }

  block.appendChild(grid);
  return block;
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function openModal(iso){
  const info = DAY_DATA[iso];
  if(!info) return;
  const d = new Date(iso + 'T00:00:00');
  const greg = d.toLocaleDateString('ar-SA-u-ca-gregory',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const hj = HIJRI_DAY[iso] || '';

  document.getElementById('modal-title').textContent = greg;
  document.getElementById('modal-sub').textContent = hj ? 'الموافق ' + hj + ' هـ' : '';
  document.getElementById('m-pilgrims').textContent = fmt(info.pilgrims);
  document.getElementById('m-groups').textContent   = info.groups.length;

  const nats = new Set(info.groups.map(g=>g.nationality).filter(Boolean));
  document.getElementById('m-nationalities').textContent = nats.size;

  const gc = document.getElementById('grp-list');
  gc.innerHTML = info.groups.length ? info.groups.map(g=>{
    const mak = g.mak || '';
    const med = g.med || '';
    const hasInfo = mak || med;
    const arrDate = g.arrival_iso ? new Date(g.arrival_iso+'T00:00:00').toLocaleDateString('ar-SA-u-ca-gregory',{day:'numeric',month:'long'}) : '';
    return `<div class="grp-card" onclick="toggleGrpCard(this)">
      <div class="grp-header">
        <div class="grp-header-top">
          <span class="grp-num">${g.prep_num}</span>
          ${g.nationality ? `<span class="grp-nat">${g.nationality}</span>` : ''}
          ${hasInfo ? '<span class="grp-arrow">▼</span>' : ''}
        </div>
        <div class="grp-header-meta">
          ${g.center ? `<span class="grp-meta-chip">🏠 مركز ${g.center}</span>` : ''}
          ${g.pilgrims ? `<span class="grp-meta-chip">👥 ${fmt(g.pilgrims)} حاج</span>` : ''}
        </div>
      </div>
      ${hasInfo ? `<div class="grp-body">
        ${mak ? `<div class="housing-row"><span class="housing-lbl">سكن مكة:</span><span class="housing-val">${mak}</span></div>` : ''}
        ${med ? `<div class="housing-row"><span class="housing-lbl">سكن المدينة:</span><span class="housing-val">${med}</span></div>` : ''}
        ${arrDate ? `<div class="arrival-row">📅 وصل المدينة: ${arrDate} — المتوقع مكة: ${new Date(iso+'T00:00:00').toLocaleDateString('ar-SA-u-ca-gregory',{day:'numeric',month:'long'})}</div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('') : '<p style="color:#5a7090;text-align:center;padding:20px">لا توجد مجموعات</p>';

  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

function toggleGrpCard(el){
  el.classList.toggle('open');
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildCalendar();
</script>

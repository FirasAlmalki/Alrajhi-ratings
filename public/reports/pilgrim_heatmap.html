<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تتبع الحجاج</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { max-width: 100%; overflow-x: hidden; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    min-height: 100vh;
    padding: 0;
    max-width: 100%;
    overflow-x: hidden;
  }
  button,input,select,textarea { min-width: 0; max-width: 100%; }

  .page-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #e6edf3;
    padding: 2rem 2rem 0.5rem;
    text-align: right;
  }
  .page-subtitle {
    color: #8b949e;
    font-size: 0.9rem;
    text-align: right;
    padding: 0 2rem 2rem;
  }

  .city-report {
    margin: 0 0 3.5rem;
    padding: 0 1rem;
  }

  .city-header {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px 12px 0 0;
    padding: 1.25rem 1.75rem;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .city-name { font-size: 1.35rem; font-weight: 700; }
  .city-name.medina { color: #3fb950; }
  .city-name.jeddah { color: #58a6ff; }
  .city-name.taif   { color: #d29922; }

  .city-stats { display: flex; gap: 1rem; flex-wrap: wrap; }

  .stat-chip {
    background: rgba(212,175,55,0.07);
    border: 1px solid rgba(212,175,55,0.3);
    border-radius: 8px;
    padding: 0.45rem 1rem;
    font-size: 0.78rem;
    color: #a8956a;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 80px;
  }
  .stat-chip span {
    color: #d4af37;
    font-weight: 700;
    font-size: 1.05rem;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.03em;
  }

  .tabs-container {
    background: #161b22;
    border-left: 1px solid #30363d;
    border-right: 1px solid #30363d;
  }

  .tab-bar {
    display: flex;
    border-bottom: 1px solid #30363d;
    background: #0d1117;
  }

  .tab-btn {
    padding: 0.7rem 1.4rem;
    background: none;
    border: none;
    color: #8b949e;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.92rem;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: #e6edf3; }
  .tab-btn.active { color: #e6edf3; font-weight: 600; }
  .tab-btn.active.medina { border-bottom-color: #3fb950; }
  .tab-btn.active.jeddah { border-bottom-color: #58a6ff; }
  .tab-btn.active.taif   { border-bottom-color: #d29922; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .no-data {
    padding: 3rem;
    text-align: center;
    color: #8b949e;
    font-size: 1rem;
  }

  .heatmap-wrapper {
    overflow: auto;
    max-height: 75vh;
    padding: 0;
    background: #161b22;
    border-radius: 0 0 12px 12px;
    border: 1px solid #30363d;
    border-top: none;
  }

  .heatmap-table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    direction: rtl;
  }

  @media (max-width: 767px) {
    .page-title { padding: 1.5rem 1rem 0.35rem; font-size: 1.4rem; }
    .page-subtitle { padding: 0 1rem 1.25rem; }
    .city-report { padding: 0 0.75rem; }
    .city-header { padding: 1rem; gap: 0.75rem; }
    .heatmap-table {
      width: auto;
      min-width: max-content;
      table-layout: auto;
    }
    .heatmap-table th.row-header { min-width: 130px; }
    .heatmap-cell { width: 38px; height: 44px; font-size: 0.6rem; }
    .heatmap-table th { font-size: 0.62rem; padding: 0.3rem 0.1rem; }
  }

  .heatmap-table th {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.7rem;
    color: #8b949e;
    padding: 0.6rem 0.15rem;
    text-align: center;
    white-space: nowrap;
    font-weight: 400;
    position: sticky;
    top: 0;
    background: #161b22;
    z-index: 3;
    border-bottom: 1px solid #30363d;
  }

  .heatmap-table th.row-header {
    font-family: 'Tajawal', sans-serif;
    font-size: 0.78rem;
    color: #8b949e;
    text-align: right;
    padding-right: 0.8rem;
    min-width: 185px;
    direction: rtl;
    position: sticky;
    right: 0;
    top: 0;
    z-index: 4;
    background: #161b22;
  }

  .date-label { display: flex; flex-direction: column; gap: 1px; text-align: right; }
  .date-hijri { font-size: 0.82rem; color: #c9d1d9; font-weight: 500; }
  .date-greg  { font-size: 0.7rem; color: #8b949e; font-family: 'JetBrains Mono', monospace; }
  .date-total { font-size: 0.67rem; color: #6e7681; margin-top: 2px; }

  .heatmap-cell {
    height: 52px;
    text-align: center;
    vertical-align: middle;
    border: 1px solid #21262d;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 0.67rem;
    font-weight: 600;
    cursor: default;
    transition: transform 0.12s, box-shadow 0.12s;
    position: relative;
    user-select: none;
  }

  .heatmap-cell.has-data {
    cursor: pointer;
  }
  .heatmap-cell.has-data:hover {
    transform: scale(1.18);
    z-index: 10;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.35);
  }

  .heatmap-cell.empty {
    background: #0d1117;
    color: transparent;
  }

  td.row-label {
    padding: 0.4rem 0.8rem 0.4rem 0;
    vertical-align: middle;
    direction: rtl;
    background: #161b22;
    position: sticky;
    right: 0;
    z-index: 2;
    border-right: none;
    border-left: 1px solid #30363d;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-overlay.open {
    display: flex;
    animation: fadeIn 0.18s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp {
    from { transform: translateY(28px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .modal-box {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    padding: 1.75rem;
    max-width: 500px;
    width: 100%;
    direction: rtl;
    animation: slideUp 0.22s ease;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1.25rem;
    gap: 1rem;
  }
  .modal-title {
    font-size: 0.97rem;
    font-weight: 600;
    color: #e6edf3;
    line-height: 1.65;
  }
  .modal-close {
    background: #21262d;
    border: 1px solid #30363d;
    color: #8b949e;
    border-radius: 6px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.18s, color 0.18s;
  }
  .modal-close:hover { background: #30363d; color: #e6edf3; }

  .modal-big-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.8rem;
    font-weight: 700;
    text-align: center;
    margin: 0.75rem 0 1.4rem;
    letter-spacing: -0.02em;
  }
  .modal-big-number.medina { color: #3fb950; }
  .modal-big-number.jeddah { color: #58a6ff; }
  .modal-big-number.taif   { color: #d29922; }

  .modal-section { margin-bottom: 1.1rem; }
  .modal-section-title {
    font-size: 0.78rem;
    font-weight: 600;
    color: #8b949e;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 0.55rem;
  }
  /* ── Group accordion cards ── */
  .groups-list { display: flex; flex-direction: column; gap: 6px; margin-top: 0.5rem; }

  .grp-card {
    background: #0d1117;
    border: 1px solid #30363d;
    border-radius: 8px;
    overflow: hidden;
    transition: border-color 0.18s;
  }
  .grp-card.open { border-color: #58a6ff; }
  .grp-card.open.medina { border-color: #3fb950; }
  .grp-card.open.jeddah { border-color: #58a6ff; }
  .grp-card.open.taif   { border-color: #d29922; }

  .grp-header-top { display:flex; align-items:center; gap:6px; }
  .grp-header-meta { display:flex; gap:5px; flex-wrap:wrap; margin-top:5px; }
  .grp-nat { font-size:0.68rem; background:rgba(255,255,255,.1); border-radius:4px; padding:1px 6px; color:#ccc; font-weight:500; }
  .grp-meta-chip { font-size:0.7rem; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.1); border-radius:5px; padding:2px 8px; color:#aaa; }
  .grp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .grp-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    font-weight: 600;
    color: #c9d1d9;
  }
  .grp-arrow {
    font-size: 10px;
    color: #8b949e;
    transition: transform 0.2s;
  }
  .grp-card.open .grp-arrow { transform: rotate(180deg); }

  .grp-body {
    display: none;
    padding: 8px 12px 10px;
    border-top: 1px solid #21262d;
  }
  .grp-card.open .grp-body { display: block; }

  .housing-row {
    display: flex;
    gap: 8px;
    padding: 4px 0;
    font-size: 0.8rem;
    border-bottom: 1px solid rgba(48,54,61,0.5);
  }
  .housing-row:last-child { border-bottom: none; }
  .housing-lbl { color: #8b949e; font-size: 0.75rem; flex-shrink: 0; min-width: 55px; }
  .housing-val { color: #e6edf3; line-height: 1.4; }
  .housing-empty { color: #484f58; font-size: 0.75rem; font-style: italic; }

  .modal-footer {
    margin-top: 1.4rem;
    text-align: center;
  }
  .modal-close-btn {
    background: #21262d;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 8px;
    padding: 0.55rem 2rem;
    font-family: 'Tajawal', sans-serif;
    font-size: 0.93rem;
    cursor: pointer;
    transition: background 0.18s;
  }
  .modal-close-btn:hover { background: #30363d; }

  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #0d1117; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #8b949e; }

  .loading-overlay{position:fixed;inset:0;background:#0d1117;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px}
  .loading-spinner{width:48px;height:48px;border:4px solid rgba(59,130,246,.2);border-top-color:#58a6ff;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-text{color:#8b949e;font-size:1rem;font-family:'Tajawal',sans-serif}
  .error-msg{color:#f85149;font-size:0.9rem;text-align:center;max-width:360px;padding:20px;font-family:'Tajawal',sans-serif}

</style>
</head>
<body>

<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">جاري تحميل البيانات...</div>
</div>
<h1 class="page-title">لوحة تتبع الحجاج</h1>
<p class="page-subtitle">خريطة حرارية لأعداد الحجاج حسب المدينة والتاريخ والساعة</p>

<div id="app"></div>

<div class="modal-overlay" id="modal" onclick="closeModalOnOverlay(event)">
  <div class="modal-box" id="modalBox">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-big-number" id="modalCount"></div>
    <div class="modal-section">
      <div class="modal-section-title">المجموعات</div>
      <div class="groups-list" id="groupsContent"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-close-btn" onclick="closeModal()">إغلاق</button>
    </div>
  </div>
</div>

<script>


const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTrA_zjzsWMbPA7AyFJJxUtwuX8DDgXdOcgUzxuJcAyHZoxKMiCihxOaUAHDmWbV1uHIhyR_qU1Za0J/pub?output=csv';

function parseCSV(text) {
  const lines = text.split('\n');
  const hi = lines.findIndex(l => l.includes('\u0627\u0644\u062c\u0646\u0633\u064a\u0629') && l.includes('\u0631\u0642\u0645 \u0627\u0644\u0645\u062c\u0645\u0648\u0639\u0629'));
  if(hi < 0) throw new Error('Header not found');
  const headers = splitCSVLine(lines[hi]);
  function ci(n){ const i=headers.indexOf(n); if(i<0) throw new Error('Col not found: '+n); return i; }
  const IDX = {
    status:      ci('\u062d\u0627\u0644\u0629 \u0627\u0644\u0645\u062c\u0645\u0648\u0639\u0629'),
    nationality: ci('\u0627\u0644\u062c\u0646\u0633\u064a\u0629'),
    pilgrims:    ci('\u0639\u062f\u062f \u0627\u0644\u062d\u062c\u0627\u062c'),
    prep_num:    ci('\u0631\u0642\u0645 \u0645\u062c\u0645\u0648\u0639\u0629 \u0627\u0644\u0627\u0633\u062a\u0639\u062f\u0627\u062f \u0627\u0644\u0645\u0633\u0628\u0642'),
    date_m:      ci('\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0642\u062f\u0648\u0645 \u0645\u064a\u0644\u0627\u062f\u064a'),
    date_h:      ci('\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0642\u062f\u0648\u0645 \u0647\u062c\u0631\u064a'),
    flight:      ci('\u0631\u0642\u0645 \u0627\u0644\u0631\u062d\u0644\u0629'),
    mode:        ci('\u0646\u0648\u0639 \u0627\u0644\u0645\u0646\u0641\u0630'),
    city:        ci('\u0645\u062f\u064a\u0646\u0629 \u0627\u0644\u0648\u0635\u0648\u0644'),
    arrival_t:   ci('\u0648\u0642\u062a \u0627\u0644\u0648\u0635\u0648\u0644'),
    center:      ci('\u0631\u0642\u0645 \u0645\u0631\u0643\u0632 \u0627\u0644\u0636\u064a\u0627\u0641\u0629'),
    mak_name:    ci('\u0627\u0633\u0645 \u0633\u0643\u0646 \u0645\u0643\u0629 \u0627\u0644\u0645\u0643\u0631\u0645\u0629'),
    med_name:    ci('\u0627\u0633\u0645 \u0633\u0643\u0646 \u0627\u0644\u0645\u062f\u064a\u0646\u0629 \u0627\u0644\u0645\u0646\u0648\u0631\u0629'),
  };
  const rows = [];
  for(let i = hi+1; i < lines.length; i++){
    const row = splitCSVLine(lines[i]);
    if(row.length <= Math.max(...Object.values(IDX))) continue;
    const g = k => (row[IDX[k]]||'').trim();
    rows.push({g, row});
  }
  return {IDX, rows};
}

function splitCSVLine(line){
  const result=[]; let cur='', inQ=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else{inQ=!inQ;} }
    else if(c===','&&!inQ){ result.push(cur.trim()); cur=''; }
    else cur+=c;
  }
  result.push(cur.trim());
  return result;
}


let DATA = {};
let GROUP_HOUSING = {};
let HIJRI = {};

async function initData(){
  try{
    const resp = await fetch(CSV_URL);
    const text = await resp.text();
    const {IDX, rows} = parseCSV(text);

    const CITY_MAP = {
      '\u0627\u0644\u0645\u062f\u064a\u0646\u0629 \u0627\u0644\u0645\u0646\u0648\u0631\u0629': '\u0627\u0644\u0645\u062f\u064a\u0646\u0629 \u0627\u0644\u0645\u0646\u0648\u0631\u0629',
      '\u062c\u062f\u0629': '\u062c\u062f\u0629',
      '\u0627\u0644\u0637\u0627\u0626\u0641': '\u0627\u0644\u0637\u0627\u0626\u0641'
    };
    const MODE_MAP = {
      '\u062c\u0648\u0627': '\u062c\u0648\u0627',
      '\u0628\u0631\u0627': '\u0628\u0631\u0627'
    };

    for(const {g} of rows){
      if(g('status') !== '\u062a\u0645 \u0627\u0644\u0627\u0639\u062a\u0645\u0627\u062f') continue;
      const city = CITY_MAP[g('city')]; if(!city) continue;
      const mode = MODE_MAP[g('mode')]; if(!mode) continue;
      const dr   = g('date_m'); if(!dr||!dr.includes('/')) continue;
      const p    = dr.split('/'); if(p.length<3) continue;
      const iso  = `${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
      if(!/^\d{4}-\d{2}-\d{2}$/.test(iso)) continue;
      const hijriRaw = g('date_h');
      if(hijriRaw && !HIJRI[iso]) HIJRI[iso] = hijriRaw;
      const prep = g('prep_num'); if(!prep) continue;
      const pcount = parseInt(g('pilgrims'))||0;
      let hour='0'; try{ hour=String(parseInt(g('arrival_t').split(':')[0])); }catch{}

      if(!DATA[city])               DATA[city]={};
      if(!DATA[city][mode])         DATA[city][mode]={};
      if(!DATA[city][mode][iso])    DATA[city][mode][iso]={};
      if(!DATA[city][mode][iso][hour]) DATA[city][mode][iso][hour]={pilgrims:0,flights:[],groups:[]};
      const cell = DATA[city][mode][iso][hour];
      cell.pilgrims += pcount;
      const fl = g('flight');
      if(fl && !cell.flights.includes(fl)) cell.flights.push(fl);
      if(!cell.groups.includes(prep)) cell.groups.push(prep);

      GROUP_HOUSING[prep] = {
        mak:         g('mak_name'),
        med:         g('med_name'),
        center:      g('center'),
        pilgrims:    pcount,
        nationality: g('nationality'),
      };
    }

    document.getElementById('loading-overlay').style.display='none';
    render();
  } catch(e){
    document.getElementById('loading-overlay').innerHTML =
      '<div class="error-msg">⚠️ تعذّر تحميل البيانات<br><small>'+e.message+'</small></div>';
  }
}

initData();

const ARABIC_DIGITS = {"0":"\u0660","1":"\u0661","2":"\u0662","3":"\u0663","4":"\u0664","5":"\u0665","6":"\u0666","7":"\u0667","8":"\u0668","9":"\u0669"};
function toArabicNum(n) {
  return String(n).split("").map(c => ARABIC_DIGITS[c] || c).join("");
}
function arabicHourLabel(h) {
  return toArabicNum(String(h).padStart(2,"0")) + ":\u0660\u0660";
}

const CITIES = [
  { key: "\u0627\u0644\u0645\u062f\u064a\u0646\u0629 \u0627\u0644\u0645\u0646\u0648\u0631\u0629", cls: "medina" },
  { key: "\u062c\u062f\u0629",  cls: "jeddah" },
  { key: "\u0627\u0644\u0637\u0627\u0626\u0641", cls: "taif" }
];

function getColor(cls, val, max) {
  if (!val || !max) return null;
  const t = Math.pow(val / max, 0.5);
  if (cls === "medina") {
    return `rgb(${Math.round(14+t*49)},${Math.round(68+t*117)},${Math.round(30+t*50)})`;
  }
  if (cls === "jeddah") {
    return `rgb(${Math.round(13+t*17)},${Math.round(56+t*74)},${Math.round(90+t*165)})`;
  }
  return `rgb(${Math.round(60+t*150)},${Math.round(40+t*113)},${Math.round(5+t*29)})`;
}

function getTextColor(cls, val, max) {
  if (!val) return "transparent";
  const t = Math.pow(val / max, 0.5);
  return t > 0.55 ? "#000" : "#fff";
}

function buildHeatmap(cityKey, cityClass, tabKey) {
  const tabData = (DATA[cityKey] && DATA[cityKey][tabKey]) || {};
  const dates = Object.keys(tabData).sort();

  if (!dates.length) {
    const label = tabKey === "\u0628\u0631\u0627" ? "\u0628\u0631\u064a\u0629" : "\u062c\u0648\u064a\u0629";
    return `<div class="no-data">\u0644\u0627 \u062a\u0648\u062c\u062f \u0628\u064a\u0627\u0646\u0627\u062a ${label}</div>`;
  }

  let maxVal = 0;
  dates.forEach(d => {
    for (let h = 0; h < 24; h++) {
      const c = tabData[d][String(h)];
      if (c && c.pilgrims > maxVal) maxVal = c.pilgrims;
    }
  });

  let html = '<table class="heatmap-table"><thead><tr><th class="row-header">\u0627\u0644\u062a\u0627\u0631\u064a\u062e</th>';
  for (let h = 0; h < 24; h++) html += `<th>${String(h).padStart(2,"0")}</th>`;
  html += "</tr></thead><tbody>";

  dates.forEach(date => {
    const hijri = HIJRI[date] || date;
    let rowTotal = 0;
    for (let h = 0; h < 24; h++) {
      const c = tabData[date] && tabData[date][String(h)];
      if (c) rowTotal += c.pilgrims;
    }

    html += "<tr>";
    html += `<td class="row-label"><div class="date-label">` +
      `<span class="date-hijri">${hijri}</span>` +
      `<span class="date-greg">${date}</span>` +
      `<span class="date-total">\u0627\u0644\u0625\u062c\u0645\u0627\u0644\u064a: ${rowTotal.toLocaleString("en-US")}</span>` +
      `</div></td>`;

    for (let h = 0; h < 24; h++) {
      const cell = tabData[date] && tabData[date][String(h)];
      const val = cell ? cell.pilgrims : 0;
      if (val > 0) {
        const bg = getColor(cityClass, val, maxVal);
        const tc = getTextColor(cityClass, val, maxVal);
        html += `<td class="heatmap-cell has-data" style="background:${bg};color:${tc}" ` +
          `data-city="${cityKey.replace(/"/g,'&quot;')}" data-tab="${tabKey}" data-date="${date}" data-hour="${h}" ` +
          `onclick="openModal(this)">${val}</td>`;
      } else {
        html += '<td class="heatmap-cell empty"></td>';
      }
    }
    html += "</tr>";
  });

  html += "</tbody></table>";
  return html;
}

function buildCityStats(cityKey) {
  const cityData = DATA[cityKey] || {};
  let totalPilgrims = 0, maxDay = null, maxDayCount = 0;
  const activeDates = new Set();
  for (const tab of Object.keys(cityData)) {
    for (const date of Object.keys(cityData[tab])) {
      let dayTotal = 0;
      for (const h of Object.keys(cityData[tab][date])) {
        dayTotal += (cityData[tab][date][h].pilgrims || 0);
      }
      totalPilgrims += dayTotal;
      activeDates.add(date);
      if (dayTotal > maxDayCount) { maxDayCount = dayTotal; maxDay = date; }
    }
  }
  return { totalPilgrims, maxDay, activeDays: activeDates.size };
}

function render() {
  const app = document.getElementById("app");
  let html = "";
  CITIES.forEach(city => {
    const stats = buildCityStats(city.key);
    const maxHijri = stats.maxDay ? (HIJRI[stats.maxDay] || stats.maxDay) : "\u2014";
    const tabs = ["\u062c\u0648\u0627", "\u0628\u0631\u0627"];
    const tabLabels = ["\u062c\u0648\u064a\u0629 (\u062c\u0648\u0627)", "\u0628\u0631\u064a\u0629 (\u0628\u0631\u0627)"];

    html += `<div class="city-report">
  <div class="city-header">
    <div class="city-name ${city.cls}">${city.key}</div>
    <div class="city-stats">
      <div class="stat-chip">\u0625\u062c\u0645\u0627\u0644\u064a \u0627\u0644\u062d\u062c\u0627\u062c <span>${stats.totalPilgrims.toLocaleString("en-US")}</span></div>
      <div class="stat-chip">\u0623\u0639\u0644\u0649 \u064a\u0648\u0645 <span>${maxHijri}</span></div>
      <div class="stat-chip">\u0623\u064a\u0627\u0645 \u0646\u0634\u0637\u0629 <span>${stats.activeDays}</span></div>
    </div>
  </div>
  <div class="tabs-container">
    <div class="tab-bar">`;

    tabs.forEach((tab, i) => {
      const active = i === 0 ? " active" : "";
      const pid = `panel-${city.key.replace(/\s/g,"_")}-${tab}`;
      html += `<button class="tab-btn ${city.cls}${active}" onclick="switchTab(this,'${pid}')">${tabLabels[i]}</button>`;
    });

    html += `</div>`;

    tabs.forEach((tab, i) => {
      const active = i === 0 ? " active" : "";
      const pid = `panel-${city.key.replace(/\s/g,"_")}-${tab}`;
      const content = buildHeatmap(city.key, city.cls, tab);
      html += `<div class="tab-panel${active}" id="${pid}"><div class="heatmap-wrapper">${content}</div></div>`;
    });

    html += `</div></div>`;
  });
  app.innerHTML = html;
}

function switchTab(btn, panelId) {
  const tabBar = btn.parentElement;
  const container = tabBar.parentElement;
  tabBar.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  container.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.getElementById(panelId).classList.add("active");
}

function openModal(cell) {
  const cityKey  = cell.getAttribute("data-city");
  const tabKey   = cell.getAttribute("data-tab");
  const date     = cell.getAttribute("data-date");
  const hour     = cell.getAttribute("data-hour");
  const cellData = DATA[cityKey]?.[tabKey]?.[date]?.[String(hour)];
  if (!cellData) return;

  const cityObj   = CITIES.find(c => c.key === cityKey);
  const cityClass = cityObj ? cityObj.cls : "medina";

  document.getElementById("modalTitle").textContent =
    cityKey + " — " + (HIJRI[date] || date) + " — الساعة " + arabicHourLabel(hour);

  const countEl = document.getElementById("modalCount");
  countEl.textContent = cellData.pilgrims.toLocaleString("en-US");
  countEl.className = "modal-big-number " + cityClass;

  // Build accordion cards — one per real group number (skip "-")
  const groups = (cellData.groups || []).filter(g => g && g !== "-");
  const gc = document.getElementById("groupsContent");
  gc.innerHTML = groups.length ? groups.map(g => {
    const h   = GROUP_HOUSING[g] || {};
    const mak = h.mak || "";
    const med = h.med || "";
    const hasInfo = mak || med;
    return `<div class="grp-card ${cityClass}" onclick="toggleGrpCard(this)">
      <div class="grp-header">
        <div class="grp-header-top">
          <span class="grp-num">${g}</span>
          ${h.nationality ? `<span class="grp-nat">${h.nationality}</span>` : ''}
          ${hasInfo ? '<span class="grp-arrow">▼</span>' : ''}
        </div>
        <div class="grp-header-meta">
          ${h.center ? `<span class="grp-meta-chip">🏠 مركز ${h.center}</span>` : ''}
          ${h.pilgrims ? `<span class="grp-meta-chip">👥 ${h.pilgrims.toLocaleString('en-US')} حاج</span>` : ''}
        </div>
      </div>
      ${hasInfo ? `<div class="grp-body">
        ${mak ? `<div class="housing-row"><span class="housing-lbl">مكة:</span><span class="housing-val">${mak}</span></div>` : ''}
        ${med ? `<div class="housing-row"><span class="housing-lbl">المدينة:</span><span class="housing-val">${med}</span></div>` : ''}
      </div>` : ''}
    </div>`;
  }).join("") : '<div style="color:#484f58;font-size:0.82rem;padding:6px 0">لا توجد مجموعات</div>';

  document.getElementById("modal").classList.add("open");
  document.body.style.overflow = "hidden";
}

function toggleGrpCard(card) {
  // Only toggle if it has a body
  if (!card.querySelector(".grp-body")) return;
  card.classList.toggle("open");
}

function closeModal() {
  document.getElementById("modal").classList.remove("open");
  document.body.style.overflow = "";
}

function closeModalOnOverlay(e) {
  if (e.target === document.getElementById("modal")) closeModal();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

render();
</script>
</body>
</html>

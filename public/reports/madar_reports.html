<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>المحاضر والمخالفات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:#0F1923;font-family:'Tajawal','Segoe UI',Tahoma,Arial,sans-serif;color:#F0EAD6;direction:rtl}

/* Header */
.phdr{background:#1B3A6B;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:2px solid #C9A84C}
.phdr-logo{font-size:.95rem;font-weight:800;color:#C9A84C;line-height:1.3}
.phdr-logo small{display:block;font-size:.6rem;color:#8AADDA;font-weight:400}
.phdr-title{font-size:1.2rem;font-weight:800;color:#fff;text-align:center;flex:1}
.phdr-date{font-size:.72rem;color:#8AADDA;text-align:left;line-height:1.7;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);border-radius:6px;padding:6px 10px}

/* Filter bar */
.fbar{background:#1B2535;border-bottom:1px solid #2E3D50;padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.fgrp{display:flex;flex-direction:column;gap:3px}
.flbl{font-size:.7rem;color:#8AADDA;font-weight:700}
.finp{background:#0F1923;border:1px solid #2E3D50;border-radius:7px;padding:7px 10px;font-family:inherit;font-size:.8rem;color:#F0EAD6;outline:none;min-width:120px}
.finp:focus{border-color:#C9A84C}
.finp option{background:#1B2535;color:#F0EAD6}
.fbtn{padding:7px 18px;border-radius:7px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:background .15s}
.fapply{background:#C9A84C;color:#0F1923}
.fapply:hover{background:#b8973e}
.fclear{background:#2E3D50;color:#8AADDA;border:1px solid #3a4f66}
.fclear:hover{background:#374d63}

/* Main */
.main{padding:20px 24px;max-width:1400px;margin:0 auto}
.loading{text-align:center;padding:60px;color:#8AADDA;font-size:1rem}

/* Export row */
.export-row{display:flex;justify-content:flex-end;margin-bottom:14px}
.export-btn{background:#1B3A6B;color:#C9A84C;border:2px solid #C9A84C;border-radius:8px;padding:8px 20px;font-family:inherit;font-size:.83rem;font-weight:700;cursor:pointer;transition:background .15s}
.export-btn:hover{background:#0C2550}
.export-btn:disabled{opacity:.5;cursor:not-allowed}

/* KPI row */
.kpi-row{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.kpi-card{flex:1;min-width:180px;border-radius:12px;padding:20px 24px;text-align:center}
.kpi-dark{background:#1B3A6B;border:1px solid #2E5490}
.kpi-light{background:#1B2535;border:1px solid #2E3D50}
.kpi-val{font-size:2.4rem;font-weight:800;line-height:1.1}
.kpi-dark .kpi-val{color:#C9A84C}
.kpi-light .kpi-val{color:#C9A84C}
.kpi-lbl{font-size:.75rem;margin-top:4px}
.kpi-dark .kpi-lbl{color:#8AADDA}
.kpi-light .kpi-lbl{color:#8AADDA}

/* Charts */
.charts-row{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.chart-card{background:#1B2535;border-radius:12px;padding:16px 18px;border:1px solid #2E3D50;flex:1;min-width:260px}
.chart-card.wide{flex:2;min-width:360px}
.chart-title{font-size:.88rem;font-weight:700;color:#F0EAD6;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #C9A84C}
.chart-wrap{position:relative;height:210px}
.chart-wrap.tall{height:250px}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:600;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-ov.open{display:flex}
.modal-box{background:#1B2535;border:1px solid #2E3D50;border-radius:14px;width:100%;max-width:1000px;margin-top:16px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;background:#1B3A6B;border-radius:14px 14px 0 0;border-bottom:2px solid #C9A84C}
.modal-hdr-title{color:#C9A84C;font-size:.92rem;font-weight:700}
.modal-close{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:6px;color:#F0EAD6;padding:4px 12px;cursor:pointer;font-family:inherit;font-size:.82rem}
.modal-close:hover{background:rgba(255,255,255,.2)}
.modal-body{padding:14px 18px;max-height:72vh;overflow-y:auto}

/* Table */
.mtable{width:100%;border-collapse:collapse;font-size:.76rem}
.mtable th{background:#1B3A6B;color:#C9A84C;padding:8px 10px;text-align:center;border:1px solid #2E5490;font-weight:700;position:sticky;top:0;white-space:nowrap}
.mtable td{padding:7px 10px;text-align:center;border:1px solid #2E3D50;color:#F0EAD6;vertical-align:middle}
.mtable td.txt{text-align:right;white-space:normal;line-height:1.4;font-size:.72rem}
.mtable tr:nth-child(even) td{background:#1a2d42}
.mtable tr:hover td{background:#243550}

/* Badges */
.bdg{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700;white-space:nowrap}
.bdg-new{background:#2E3D50;color:#8AADDA}
.bdg-ok{background:#1a3a2a;color:#4CAF8A;border:1px solid #2e6644}
.bdg-rej{background:#3a1a1a;color:#e07070;border:1px solid #6a2a2a}
.bdg-yes{background:#1a3a2a;color:#4CAF8A;border:1px solid #2e6644}
.bdg-no{background:#3a1a1a;color:#e07070;border:1px solid #6a2a2a}

.no-data{text-align:center;padding:30px;color:#8AADDA;font-size:.85rem}

@media(max-width:768px){
  .phdr{padding:10px 14px;flex-wrap:wrap}
  .phdr-title{font-size:1rem}
  .fbar{padding:10px 14px}
  .main{padding:12px}
  .chart-card.wide{min-width:300px}
}
</style>
</head>
<body>

<!-- Header -->
<div class="phdr">
  <div class="phdr-logo">الراجحي<small>Al Rajhi</small></div>
  <div class="phdr-title">المحاضر والمخالفات اليومي</div>
</div>

<!-- Filter bar -->
<div class="fbar">
  <div class="fgrp"><div class="flbl">من تاريخ</div><input type="date" class="finp" id="fFrom"></div>
  <div class="fgrp"><div class="flbl">إلى تاريخ</div><input type="date" class="finp" id="fTo"></div>
  <div class="fgrp">
    <div class="flbl">النوع</div>
    <select class="finp" id="fType">
      <option value="">— الكل —</option>
      <option value="إثبات حالة">إثبات حالة</option>
      <option value="مخالفة">مخالفة</option>
    </select>
  </div>
  <div class="fgrp">
    <div class="flbl">الحالة</div>
    <select class="finp" id="fStatus">
      <option value="">— الكل —</option>
      <option value="جديد">جديد</option>
      <option value="موافقة">موافقة</option>
      <option value="مرفوض">مرفوض</option>
    </select>
  </div>
  <div class="fgrp">
    <div class="flbl">انتهت الحالة</div>
    <select class="finp" id="fClosed">
      <option value="">— الكل —</option>
      <option value="نعم">نعم</option>
      <option value="لا">لا</option>
    </select>
  </div>
  <div class="fgrp">
    <div class="flbl">مركز الخدمة</div>
    <select class="finp" id="fCenter" style="min-width:160px">
      <option value="">— الكل —</option>
    </select>
  </div>
  <div style="display:flex;gap:6px;align-items:flex-end">
    <button class="fbtn fapply" onclick="applyFilter()">تطبيق</button>
    <button class="fbtn fclear" onclick="clearFilter()">مسح</button>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="loading" id="loadMsg">⏳ جاري تحميل البيانات...</div>
  <div id="dash" style="display:none">

    <!-- Export -->
    <div class="export-row">
      <button class="export-btn" id="exportBtn" onclick="doExport()">تصدير Excel</button>
    </div>

    <!-- KPIs -->
    <div class="kpi-row">
      <div class="kpi-card kpi-dark">
        <div class="kpi-val" id="kpiTotal">0</div>
        <div class="kpi-lbl">إجمالي المحاضر من بداية الموسم</div>
      </div>
      <div class="kpi-card kpi-light">
        <div class="kpi-val" id="kpiToday">0</div>
        <div class="kpi-lbl">محاضر اليوم</div>
      </div>
    </div>

    <!-- Donut charts -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">هل الحالة منتهية؟</div>
        <div class="chart-wrap"><canvas id="cClosed"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">التصنيف حسب الحالة</div>
        <div class="chart-wrap"><canvas id="cStatus"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">التصنيف حسب النوع</div>
        <div class="chart-wrap"><canvas id="cType"></canvas></div>
      </div>
    </div>

    <!-- Bar charts -->
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">التصنيف — لصالح من؟</div>
        <div class="chart-wrap tall"><canvas id="cFor"></canvas></div>
      </div>
      <div class="chart-card wide">
        <div class="chart-title">المحاضر حسب مركز الخدمة</div>
        <div class="chart-wrap tall"><canvas id="cCenter"></canvas></div>
      </div>
    </div>

  </div>
</div>

<!-- Modal -->
<div class="modal-ov" id="modalOv" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-hdr">
      <span class="modal-hdr-title" id="modalTitle">—</span>
      <button class="modal-close" onclick="closeModal()">✕ إغلاق</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const WEBHOOK_URL = 'https://n8n.thelpw.com/webhook/mahadher';

const NAVY='#1B3A6B', GOLD='#C9A84C', LGRAY='#d0ccc4', GREEN='#2e7d32', RED='#c62828', GRAY='#8a9fc0';
const PALETTE=[NAVY,GOLD,RED,GREEN,GRAY,'#5d4037','#1565c0','#e65100','#4a148c','#006064','#558b2f','#6a1b9a'];

const CLASSIF_COLOR={
  'لصالح فريق الضيافة':NAVY,
  'على فريق الضيافة':GOLD,
  'وزارة على فريق الضيافة':RED,
  'موافقة':GREEN,
};

let allData=[], filteredData=[], charts={};

// ── Helpers ─────────────────────────────────────────────────────────────────
function parseDate(s){
  if(!s) return null;
  s=String(s).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  if(/^\d{2}\/\d{2}\/\d{4}/.test(s)){const[d,m,y]=s.split('/');return `${y}-${m}-${d}`;}
  return null;
}
function todayISO(){
  const d=new Date();d.setTime(d.getTime()+3*3600*1000);
  return d.toISOString().slice(0,10);
}
function fmtDate(iso){
  if(!iso)return'—';const[y,m,d]=iso.split('-');return `${d}/${m}/${y}`;
}
function countBy(arr,fn){
  const m={};arr.forEach(r=>{const k=fn(r)||'غير محدد';m[k]=(m[k]||0)+1;});return m;
}
function topN(obj,n=12){
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

// ── Load ─────────────────────────────────────────────────────────────────────
async function loadData(){
  const r=await fetch(WEBHOOK_URL);
  if(!r.ok) throw new Error('fetch failed');
  const data=await r.json();
  return Array.isArray(data)?data:[data];
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init(){
  try{
    allData=await loadData();
    if(!Array.isArray(allData)) allData=[];
  }catch(e){
    document.getElementById('loadMsg').textContent='⚠️ خطأ في تحميل البيانات. تحقق من اسم الجدول.';
    return;
  }

  // Populate center dropdown
  const centers=[...new Set(allData.map(r=>r['مركز خدمة']).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'ar'));
  const sel=document.getElementById('fCenter');
  centers.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;sel.appendChild(o);});

  filteredData=[...allData];
  document.getElementById('loadMsg').style.display='none';
  document.getElementById('dash').style.display='block';
  renderAll();
})();

// ── Filter ───────────────────────────────────────────────────────────────────
function applyFilter(){
  const from=document.getElementById('fFrom').value;
  const to=document.getElementById('fTo').value;
  const type=document.getElementById('fType').value;
  const status=document.getElementById('fStatus').value;
  const closed=document.getElementById('fClosed').value;
  const center=document.getElementById('fCenter').value;

  filteredData=allData.filter(r=>{
    const d=parseDate(r['التاريخ']);
    if(from&&d&&d<from) return false;
    if(to&&d&&d>to) return false;
    if(type&&r['النوع']!==type) return false;
    if(status&&r['الحالة']!==status) return false;
    if(closed&&r['انتهت الحالة']!==closed) return false;
    if(center&&r['مركز خدمة']!==center) return false;
    return true;
  });
  renderAll();
}
function clearFilter(){
  ['fFrom','fTo','fType','fStatus','fClosed','fCenter'].forEach(id=>{document.getElementById(id).value='';});
  filteredData=[...allData];
  renderAll();
}

// ── Render ───────────────────────────────────────────────────────────────────
function renderAll(){
  document.getElementById('kpiTotal').textContent=filteredData.length.toLocaleString('en-US');
  document.getElementById('kpiToday').textContent='—';

  renderDonut('cClosed',
    countBy(filteredData,r=>r['انتهت الحالة']),
    {'نعم':NAVY,'لا':LGRAY,'غير محدد':GRAY},
    'هل الحالة منتهية','انتهت الحالة');

  renderDonut('cStatus',
    countBy(filteredData,r=>r['الحالة']),
    {'جديد':GRAY,'موافقة':GREEN,'مرفوض':RED,'غير محدد':'#bbb'},
    'الحالة','الحالة');

  renderDonut('cType',
    countBy(filteredData,r=>r['النوع']),
    {'إثبات حالة':NAVY,'مخالفة':GOLD,'غير محدد':GRAY},
    'النوع','النوع');

  renderBar('cFor',countBy(filteredData,r=>r['تصنيف']),'التصنيف','تصنيف','h');
  renderBar('cCenter',countBy(filteredData,r=>r['مركز خدمة']),'مركز الخدمة','مركز خدمة','v');
}

// ── Donut ────────────────────────────────────────────────────────────────────
function renderDonut(id,counts,colorMap,title,filterKey){
  if(charts[id]){charts[id].destroy();}
  const labels=Object.keys(counts), data=Object.values(counts);
  const colors=labels.map(l=>colorMap[l]||GRAY);
  const total=data.reduce((a,b)=>a+b,0);

  charts[id]=new Chart(document.getElementById(id),{
    type:'doughnut',
    data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#1B2535',hoverOffset:8}]},
    options:{
      responsive:true,maintainAspectRatio:false,cutout:'62%',
      plugins:{
        legend:{position:'top',labels:{font:{family:'Tajawal',size:11},padding:6,usePointStyle:true,boxWidth:10,color:'#F0EAD6'}},
        tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed} (${total?((c.parsed/total)*100).toFixed(0):0}%)`}}
      },
      onClick(e,el){
        if(!el.length)return;
        const lbl=labels[el[0].index];
        const sub=filteredData.filter(r=>(r[filterKey]||'غير محدد')===lbl);
        showModal(`${title}: ${lbl} (${sub.length})`,sub);
      }
    }
  });
}

// ── Bar ──────────────────────────────────────────────────────────────────────
function renderBar(id,counts,title,filterKey,orientation){
  if(charts[id]){charts[id].destroy();}
  const entries=topN(counts);
  const labels=entries.map(e=>e[0]),data=entries.map(e=>e[1]);
  const colors=labels.map((l,i)=>CLASSIF_COLOR[l]||PALETTE[i%PALETTE.length]);
  const isH=orientation==='h';

  charts[id]=new Chart(document.getElementById(id),{
    type:'bar',
    data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:4,hoverBackgroundColor:colors.map(c=>c+'cc')}]},
    options:{
      responsive:true,maintainAspectRatio:false,indexAxis:isH?'y':'x',
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:c=>`${c.parsed[isH?'x':'y']} محضر`}}
      },
      scales:{
        x:{grid:{display:!isH,color:'#2E3D50'},ticks:{font:{family:'Tajawal',size:10},color:'#8AADDA'}},
        y:{grid:{display:isH,color:'#2E3D50'},ticks:{font:{family:'Tajawal',size:10},color:'#8AADDA',maxRotation:35,minRotation:0}}
      },
      onClick(e,el){
        if(!el.length)return;
        const lbl=labels[el[0].index];
        const sub=filteredData.filter(r=>(r[filterKey]||'غير محدد')===lbl);
        showModal(`${title}: ${lbl} (${sub.length})`,sub);
      }
    }
  });
}

// ── Modal ────────────────────────────────────────────────────────────────────
function showModal(title,data){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalBody').innerHTML=data.length?buildTable(data):'<div class="no-data">لا توجد بيانات</div>';
  document.getElementById('modalOv').classList.add('open');
}
function closeModal(){document.getElementById('modalOv').classList.remove('open');}

function badgeStatus(v){
  if(v==='موافقة') return `<span class="bdg bdg-ok">${v}</span>`;
  if(v==='مرفوض')  return `<span class="bdg bdg-rej">${v}</span>`;
  return `<span class="bdg bdg-new">${v||'جديد'}</span>`;
}
function badgeClosed(v){
  return v==='نعم'?`<span class="bdg bdg-yes">نعم</span>`:`<span class="bdg bdg-no">لا</span>`;
}

function buildTable(data){
  const rows=data.map(r=>`<tr>
    <td>${r['ID']||'—'}</td>
    <td style="white-space:nowrap">${fmtDate(parseDate(r['التاريخ']))}</td>
    <td style="white-space:nowrap">${r['النوع']||'—'}</td>
    <td class="txt">${r['مركز خدمة']||'—'}</td>
    <td class="txt">${r['تصنيف']||'—'}</td>
    <td>${badgeStatus(r['الحالة'])}</td>
    <td>${badgeClosed(r['انتهت الحالة'])}</td>
    <td class="txt">${r['محرر المحضر']||'—'}</td>
    <td class="txt" style="max-width:220px">${r['تفاصيل المحضر']||'—'}</td>
    <td class="txt" style="max-width:220px">${r['الاجراء المتخذ']||'—'}</td>
  </tr>`).join('');
  return `<table class="mtable"><thead><tr>
    <th>#</th><th>التاريخ</th><th>النوع</th><th>مركز الخدمة</th>
    <th>التصنيف</th><th>الحالة</th><th>منتهية</th><th>المحرر</th>
    <th>التفاصيل</th><th>الإجراء المتخذ</th>
  </tr></thead><tbody>${rows}</tbody></table>`;
}

// ── Export ───────────────────────────────────────────────────────────────────
async function doExport(){
  if(!filteredData.length){alert('لا توجد بيانات للتصدير');return;}
  const btn=document.getElementById('exportBtn');
  btn.disabled=true;btn.textContent='⏳ جاري التصدير...';
  try{
    const wb=new ExcelJS.Workbook();
    wb.creator='Al Rajhi Hajj';wb.views=[{rightToLeft:true}];
    const ws=wb.addWorksheet('المحاضر',{views:[{rightToLeft:true,state:'frozen',ySplit:2}],properties:{defaultRowHeight:20}});

    ws.mergeCells('A1:J1');
    const t=ws.getCell('A1');
    t.value='المحاضر والمخالفات — إدارة الامتثال والالتزام — موسم الحج 1447';
    t.font={bold:true,size:12,color:{argb:'FF1B3A6B'},name:'Tajawal'};
    t.alignment={horizontal:'center'};
    t.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF8EE'}};
    ws.getRow(1).height=26;

    const hdrs=['ID','التاريخ','النوع','مركز الخدمة','التصنيف','الحالة','انتهت الحالة','مشرف الفترة','محرر المحضر','تفاصيل المحضر'];
    const hRow=ws.addRow(hdrs);
    hRow.eachCell(cell=>{
      cell.font={bold:true,color:{argb:'FFC9A84C'},name:'Tajawal',size:10};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1B3A6B'}};
      cell.alignment={horizontal:'center'};
      cell.border={bottom:{style:'thin',color:{argb:'FFC9A84C'}}};
    });
    hRow.height=22;

    filteredData.forEach((r,i)=>{
      const row=ws.addRow([
        r['ID'],fmtDate(parseDate(r['التاريخ'])),r['النوع']||'',r['مركز خدمة']||'',
        r['تصنيف']||'',r['الحالة']||'',r['انتهت الحالة']||'',
        r['مشرف الفترة']||'',r['محرر المحضر']||'',r['تفاصيل المحضر']||''
      ]);
      row.eachCell(cell=>{
        cell.alignment={vertical:'middle',wrapText:false};
        cell.font={name:'Tajawal',size:10};
        if(i%2===0) cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF9F6F0'}};
      });
    });

    [6,12,14,22,22,10,12,16,18,40].forEach((w,i)=>{ws.getColumn(i+1).width=w;});

    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`المحاضر_${todayISO()}.xlsx`;
    a.click();
  }catch(e){alert('خطأ في التصدير');}
  finally{btn.disabled=false;btn.textContent='تصدير Excel';}
}
</script>
</body>
</html>
